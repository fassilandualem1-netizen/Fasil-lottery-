<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የኛ ቤት - መቆጣጠሪያ (Admin)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-900 text-white p-4 font-sans selection:bg-blue-500">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex items-center space-x-3 bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
            <div class="bg-blue-600 p-3 rounded-lg"><i class="fa-solid fa-user-shield text-xl"></i></div>
            <div>
                <h1 class="text-xl font-bold">የኛ ቤት - መቆጣጠሪያ</h1>
                <p class="text-gray-400 text-sm">ADMIN SYSTEM v3.0</p>
            </div>
            <button onclick="fetchDashboardData()" class="ml-auto text-gray-400 hover:text-white"><i class="fa-solid fa-rotate-right"></i></button>
        </div>

        <!-- 📊 Stats Grid (የሪፖርት ሰሌዳ) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-xs mb-1">ጠቅላላ ተጠቃሚዎች</p>
                <h2 id="stat-total-users" class="text-2xl font-bold">0</h2>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-xs mb-1">የታገዱ ደንበኞች</p>
                <h2 id="stat-banned" class="text-2xl font-bold text-red-400">0</h2>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-xs mb-1">ጠቅላላ ገቢ (Deposit)</p>
                <h2 id="stat-deposit" class="text-xl font-bold text-green-400">0.00 ETB</h2>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-xs mb-1">የተጣራ ትርፍ (Net Profit)</p>
                <h2 id="stat-profit" class="text-xl font-bold text-blue-400">0.00 ETB</h2>
            </div>
        </div>

                <!-- ⚙️ Action Panel (እርምጃ መውሰጃ) -->
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
            <h3 class="text-lg font-bold mb-5 border-b border-gray-700 pb-3">
                <i class="fa-solid fa-users-gear mr-2 text-blue-400"></i>የተጠቃሚዎች መቆጣጠሪያ
            </h3>
            
            <!-- ዋናው ፎርም (ወደ ጎን የተሰለፈ) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                
                <!-- 1. የ ID መሙያ ክፍል -->
                <div>
                    <label class="block text-gray-400 text-sm font-semibold mb-2">የተጠቃሚው ቴሌግራም ID</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <i class="fa-solid fa-id-badge text-gray-500"></i>
                        </div>
                        <input type="number" id="target-id" placeholder="ለምሳሌ: 12345678" class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-10 p-3 text-white outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition shadow-sm">
                    </div>
                </div>
                
                <!-- 2. የብር ማስተካከያ ክፍል -->
                <div>
                    <label class="block text-gray-400 text-sm font-semibold mb-2">የባላንስ ማስተካከያ (ብር)</label>
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                <i class="fa-solid fa-money-bill text-gray-500"></i>
                            </div>
                            <input type="number" id="amount-input" placeholder="መጠን (ለምሳሌ: 500)" class="w-full bg-gray-900 border border-gray-600 rounded-lg pl-10 p-3 text-white outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition shadow-sm">
                        </div>
                        <button onclick="submitAction('adjust_balance', 'add')" class="px-5 bg-green-600 hover:bg-green-500 rounded-lg font-bold text-sm transition shadow-sm flex items-center justify-center gap-2 whitespace-nowrap">
                            <i class="fa-solid fa-plus"></i> ጨምር
                        </button>
                        <button onclick="submitAction('adjust_balance', 'subtract')" class="px-5 bg-yellow-600 hover:bg-yellow-500 rounded-lg font-bold text-sm transition shadow-sm flex items-center justify-center gap-2 whitespace-nowrap text-gray-900">
                            <i class="fa-solid fa-minus"></i> ቀንስ
                        </button>
                    </div>
                </div>

            </div>

            <!-- 3. የእገዳ ቁልፎች (Ban / Unban) -->
            <div class="flex flex-col sm:flex-row gap-4 pt-5 border-t border-gray-700">
                <button onclick="submitAction('ban')" class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-lg font-bold transition shadow-sm flex items-center justify-center text-white">
                    <i class="fa-solid fa-user-slash mr-2"></i>ተጠቃሚውን እገድ
                </button>
                <button onclick="submitAction('unban')" class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-lg font-bold transition shadow-sm flex items-center justify-center text-white">
                    <i class="fa-solid fa-user-check mr-2"></i>እገዳውን አንሳ
                </button>
            </div>
        </div>


        <!-- 👥 Users Table (የተጠቃሚዎች ዝርዝር ሰንጠረዥ) -->
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                <h3 class="text-lg font-bold"><i class="fa-solid fa-list mr-2"></i>የደንበኞች ዝርዝር</h3>
                <h3 class="text-sm text-gray-400">በደንበኞች እጅ ያለ አጠቃላይ ብር: <span id="stat-total-user-balance" class="font-bold text-white">0.00 ETB</span></h3>
            </div>
            
            <!-- ፍለጋ -->
            <input type="text" id="search-input" onkeyup="filterUsers()" placeholder="በ ID ይፈልጉ..." class="w-full mb-4 bg-gray-900 border border-gray-600 rounded-lg p-2 text-white outline-none focus:border-blue-500">

            <div class="overflow-x-auto h-64 overflow-y-auto rounded-lg border border-gray-700">
                <table class="w-full text-left text-sm text-gray-300">
                    <thead class="text-xs uppercase bg-gray-700 sticky top-0">
                        <tr>
                            <th class="px-4 py-3">ተ.ቁ</th>
                            <th class="px-4 py-3">ቴሌግራም ID</th>
                            <th class="px-4 py-3 text-right">ቀሪ ሂሳብ (ETB)</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- ዳታው በ ጃቫስክሪፕት እዚህ ይገባል -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ጃቫስክሪፕት እና ሎጂክ -->
    <script>
        // ቴሌግራም መታወቂያን ማግኘት
        const initData = window.Telegram.WebApp.initDataUnsafe;
        const myAdminId = initData.user ? initData.user.id : "LOCAL_TEST";

        // ገጹ ሲከፈት ዳታውን ያመጣል
        window.onload = () => {
            fetchDashboardData();
        };

        // የዳሽቦርድ ዳታ ሰብሳቢ
        async function fetchDashboardData() {
            try {
                const res = await fetch('/api/admin/get_dashboard_data', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ admin_id: myAdminId })
                });
                
                const data = await res.json();
                
                if(data.status === 'success') {
                    // ቁጥሮችን መሙላት
                    document.getElementById('stat-total-users').innerText = data.stats.total_users;
                    document.getElementById('stat-banned').innerText = data.stats.banned_users;
                    document.getElementById('stat-deposit').innerText = data.stats.total_deposits.toFixed(2) + " ETB";
                    document.getElementById('stat-profit').innerText = data.stats.net_profit.toFixed(2) + " ETB";
                    document.getElementById('stat-total-user-balance').innerText = data.stats.total_user_balances.toFixed(2) + " ETB";

                    // ሰንጠረዡን መሙላት
                    const tbody = document.getElementById('users-table-body');
                    tbody.innerHTML = "";
                    data.users.forEach((user, index) => {
                        const tr = document.createElement('tr');
                        tr.className = "border-b border-gray-700 hover:bg-gray-700 transition";
                        tr.innerHTML = `
                            <td class="px-4 py-3">${index + 1}</td>
                            <td class="px-4 py-3 font-bold text-blue-400 user-id-cell cursor-pointer" onclick="document.getElementById('target-id').value='${user.user_id}'">${user.user_id}</td>
                            <td class="px-4 py-3 text-right font-bold text-green-400">${user.balance.toFixed(2)}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    alert(data.message);
                }
            } catch(e) {
                console.error("Error fetching data", e);
            }
        }

        // የፍለጋ ሳጥን ኮድ
        function filterUsers() {
            let input = document.getElementById("search-input").value.toUpperCase();
            let table = document.getElementById("users-table-body");
            let tr = table.getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[1]; // ID column
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    if (txtValue.toUpperCase().indexOf(input) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }       
            }
        }

        // እርምጃ መውሰጃ (Ban, Unban, Adjust)
        async function submitAction(actionType, adjustMode = 'add') {
            const targetId = document.getElementById('target-id').value;
            let amount = document.getElementById('amount-input').value;

            if(!targetId) return alert("እባክዎ የተጠቃሚውን ID ያስገቡ!");

            if(actionType === 'adjust_balance') {
                if(!amount) return alert("እባክዎ የብር መጠን ያስገቡ!");
                amount = parseFloat(amount);
                if(adjustMode === 'subtract') amount = -amount; // ሲቀነስ ኔጌቲቭ እናደርገዋለን
            }

            try {
                const res = await fetch('/api/admin/user_action', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        admin_id: myAdminId,
                        target_user_id: targetId,
                        action: actionType,
                        amount: amount
                    })
                });

                const data = await res.json();
                if(data.status === 'success') {
                    window.Telegram.WebApp.showAlert(data.message);
                    document.getElementById('amount-input').value = ""; // ሳጥኑን ማጽዳት
                    fetchDashboardData(); // ዳታውን ሪፍሬሽ ማድረግ
                } else {
                    window.Telegram.WebApp.showAlert(data.message);
                }
            } catch(e) {
                alert("የሲስተም ስህተት ተፈጥሯል");
            }
        }
    </script>
</body>
</html>
