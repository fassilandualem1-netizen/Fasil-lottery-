<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የኛ ቤት - የአድሚን መቆጣጠሪያ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased">

    <!-- 🛑 ያልተፈቀደ ሰው ሲገባ የሚታይ መከላከያ ስክሪን -->
    <div id="access-denied-screen" class="flex flex-col items-center justify-center h-screen w-full fixed inset-0 bg-gray-950 z-50 p-6 text-center">
        <div class="bg-red-950/40 border border-red-900 p-6 rounded-2xl max-w-sm space-y-4 shadow-xl">
            <i class="fa-solid fa-circle-exclamation text-red-500 text-5xl animate-pulse"></i>
            <h2 class="text-xl font-bold text-red-400">የደህንነት ጥሰት ማሳሰቢያ!</h2>
            <p class="text-sm text-gray-400 leading-relaxed">ይህ ገጽ ለሲስተም አድሚን ብቻ የተፈቀደ ነው። የእርስዎ መለያ ወደዚህ ገጽ የመግባት መብት የለውም!</p>
        </div>
    </div>

    <!-- 📊 ዋናው የአድሚን መቆጣጠሪያ ይዘት (በዲፎልት የተደበቀ 'hidden' ነው) -->
    <div id="admin-main-content" class="hidden">
        
        <!-- 🔝 Header -->
        <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-50">
            <div class="flex justify-between items-center max-w-4xl mx-auto">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg text-white">
                        <i class="fa-solid fa-user-shield text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-tight">የኛ ቤት - መቆጣጠሪያ</h1>
                        <p class="text-[10px] text-blue-400 font-mono">ADMIN SYSTEM v2.0</p>
                    </div>
                </div>
                <button onclick="loadStats()" class="bg-gray-800 hover:bg-gray-700 text-white p-2 rounded-lg transition">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-4 space-y-6 pb-24">
            
            <!-- 📊 OVERVIEW STATS CARDS -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl">
                    <div class="text-xs text-gray-400 mb-1">ጠቅላላ ተጠቃሚዎች</div>
                    <div class="text-2xl font-black text-white" id="stat-users">0</div>
                </div>
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl">
                    <div class="text-xs text-gray-400 mb-1">የታገዱ ደንበኞች</div>
                    <div class="text-2xl font-black text-red-500" id="stat-banned">0</div>
                </div>
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl">
                    <div class="text-xs text-gray-400 mb-1">ጠቅላላ ገቢ (Deposit)</div>
                    <div class="text-xl font-bold text-green-500" id="stat-deposits">0.00 ETB</div>
                </div>
                <div class="bg-gray-900 border border-gray-800 p-4 rounded-xl">
                    <div class="text-xs text-gray-400 mb-1">የተጣራ ትርፍ (Net)</div>
                    <div class="text-xl font-bold text-blue-400" id="stat-profit">0.00 ETB</div>
                </div>
            </div>

            <!-- 🛡️ USER MANAGER PANEL -->
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 space-y-4">
                <h2 class="font-bold text-md flex items-center gap-2 text-gray-200 border-b border-gray-800 pb-2">
                    <i class="fa-solid fa-users-gear text-blue-500"></i> የተጠቃሚዎች መቆጣጠሪያ
                </h2>
                
                <div class="space-y-3">
                    <label class="block text-xs text-gray-400 font-semibold">የተጠቃሚው ቴሌግራም ID</label>
                    <input id="target-id" type="number" placeholder="ለምሳሌ: 12345678" class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 font-mono text-white">
                </div>

                <!-- 🔥 Quick Balance Actions -->
                <div class="space-y-3 pt-2">
                    <label class="block text-xs text-gray-400 font-semibold">የባላንስ ማስተካከያ መጠን (ብር)</label>
                    <div class="flex gap-2">
                        <input id="adjust-amount" type="number" placeholder="ለምሳሌ: 500" class="flex-1 bg-gray-950 border border-gray-800 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 font-mono text-white">
                        <button onclick="adjustBalance(1)" class="bg-green-600 hover:bg-green-500 text-white px-4 rounded-lg font-bold text-xs transition">+ ጨምር</button>
                        <button onclick="adjustBalance(-1)" class="bg-amber-600 hover:bg-amber-500 text-white px-4 rounded-lg font-bold text-xs transition">- ቀንስ</button>
                    </div>
                </div>

                <!-- 🚨 Ban/Unban Actions -->
                <div class="grid grid-cols-2 gap-3 pt-4 border-t border-gray-800">
                    <button onclick="setUserStatus('ban')" class="w-full bg-red-600 hover:bg-red-500 text-white py-3 rounded-lg font-bold text-xs transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-ban"></i> ተጠቃሚውን እገድ
                    </button>
                    <button onclick="setUserStatus('unban')" class="w-full bg-gray-800 hover:bg-gray-700 text-white py-3 rounded-lg font-bold text-xs transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-unlock"></i> እገዳውን አንሳ
                    </button>
                </div>
            </div>
        </main>
    </div> <!-- የ main-content መዝጊያ -->

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ⚠️ ያንተን እውነተኛ አድሚን ID እዚህ ጋር በትክክል አስገባው
        const TRUE_ADMIN_ID = "8488592165"; 
        
        const currentUserId = String(tg.initDataUnsafe?.user?.id || "");
        const adminId = currentUserId || TRUE_ADMIN_ID; 

        // 🛡️ የመግቢያ መብት መፈተሻ (ID ቼክ ማድረግ)
        if (currentUserId === TRUE_ADMIN_ID) {
            // ትክክለኛው አድሚን ከሆነ መከላከያውን ደብቀህ ዋናውን ገፅ አሳይ
            document.getElementById('access-denied-screen').classList.add('hidden');
            document.getElementById('admin-main-content').classList.remove('hidden');
            
            // የስታቲስቲክስ መረጃዎችን አሁን አምጣ
            loadStats();
        } else {
            console.warn("Access Denied: ያልተፈቀደለት ሰው ሊገባ ሞክሯል!");
            // ያልተፈቀደለት ሰው ስለሆነ ከቀዩ ስክሪን ውጪ ምንም አያይም፤ ዳታም ከሰርቨር አይጠየቅም!
        }

        // 📊 ስታቲስቲክስ ከሰርቨር ማምጫ
        function loadStats() {
            fetch('/api/admin/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ admin_id: adminId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById('stat-users').innerText = data.total_users;
                    document.getElementById('stat-banned').innerText = data.banned_users;
                    document.getElementById('stat-deposits').innerText = parseFloat(data.total_deposits).toFixed(2) + " ETB";
                    
                    const profitElement = document.getElementById('stat-profit');
                    profitElement.innerText = parseFloat(data.net_profit).toFixed(2) + " ETB";
                    if (data.net_profit >= 0) {
                        profitElement.className = "text-xl font-bold text-blue-400";
                    } else {
                        profitElement.className = "text-xl font-bold text-red-400";
                    }
                } else {
                    alert("ስህተት: " + data.message);
                }
            })
            .catch(err => console.error("ዳታ ማምጣት አልተቻለም!"));
        }

        // 🚫 እገዳ የመጣያና መፍቻ ፈንክሽን
        function setUserStatus(action) {
            const targetId = document.getElementById('target-id').value;
            if (!targetId) return alert("እባክዎ መጀመሪያ የተጠቃሚውን ID ያስገቡ!");

            const confirmMsg = action === 'ban' ? "እርግጠኛ ነዎት ይህንን ተጠቃሚ ማገድ ይፈልጋሉ?" : "የተጠቃሚውን እገዳ ማንሳት ይፈልጋሉ?";
            if (!confirm(confirmMsg)) return;

            fetch('/api/admin/user_action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    admin_id: adminId,
                    target_user_id: targetId,
                    action: action
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                loadStats();
            });
        }

        // 💰 ባላንስ በእጅ የመጨመሪያና መቀነሻ ፈንክሽን
        function adjustBalance(multiplier) {
            const targetId = document.getElementById('target-id').value;
            const rawAmount = parseFloat(document.getElementById('adjust-amount').value);
            
            if (!targetId || isNaN(rawAmount) || rawAmount <= 0) {
                return alert("እባክዎ የተጠቃሚ ID እና ትክክለኛ የብር መጠን ያስገቡ!");
            }

            const amount = rawAmount * multiplier;
            const msg = amount > 0 ? `ለተጠቃሚው ${rawAmount} ብር ለመጨመር እርግጠኛ ነዎት?` : `ከተጠቃሚው ላይ ${rawAmount} ብር ለመቀነስ እርግጠኛ ነዎት?`;
            if (!confirm(msg)) return;

            fetch('/api/admin/user_action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    admin_id: adminId,
                    target_user_id: targetId,
                    action: 'adjust_balance',
                    amount: amount
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                document.getElementById('adjust-amount').value = "";
                loadStats();
            });
        }
    </script>
</body>
</html>
