<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Sports - የኛ ቤት</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-32">

  <!-- 🔝 Header -->
  <header class="bg-slate-950 p-4 sticky top-0 z-50 flex items-center border-b border-gray-800">
    <a href="/" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
    <h1 class="font-black text-lg tracking-widest text-yellow-400">REAL SPORTS</h1>
  </header>

  <!-- Main Content -->
  <main class="max-w-md mx-auto p-3">
    <div id="matches-list" class="space-y-3">
      <!-- እዚህ ጋር ጨዋታዎች በ JS ይገባሉ -->
      <p class="text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i><br>ጨዋታዎችን በማምጣት ላይ...</p>
    </div>
  </main>

  <!-- 🎟 Bet Slip (ከስር የሚታይ) -->
  <div id="bet-slip-container" class="fixed bottom-0 left-0 w-full bg-slate-950 border-t-2 border-yellow-500 p-4 shadow-2xl hidden z-50">
    <div class="flex justify-between text-xs font-bold text-gray-300 mb-2">
      <span>የተመረጡ: <span id="slip-count" class="text-white">0</span></span>
      <span>ጠቅላላ ኦድ: <span id="slip-odds" class="text-yellow-400">1.00</span></span>
    </div>
    <div class="text-[10px] text-green-400 mb-3 font-bold">ሊያሸንፉ የሚችሉት: <span id="possible-win" class="text-sm">0.00</span> ETB</div>
    <div class="flex gap-2">
      <input type="number" id="bet-amount" placeholder="መጠን (ETB)" min="10" oninput="updateBetSlip()" class="w-2/3 bg-gray-900 border border-gray-800 rounded-lg p-2 text-white font-bold text-sm outline-none">
      <button onclick="placeBet()" class="w-1/3 bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black py-2 rounded-lg text-xs transition">ወራረድ (BET)</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = tg.initDataUnsafe?.user?.id || "999999";
    const initData = tg.initData;
    let selectedBets = {};

    // 1. ጨዋታዎችን ማምጣት
    async function fetchMatches() {
        try {
            const res = await fetch('/api/sports/matches');
            const data = await res.json();
            const list = document.getElementById("matches-list");
            list.innerHTML = "";

            data.matches.forEach(m => {
                const matchId = m.fixture.id;
                const home = m.teams.home.name;
                const away = m.teams.away.name;
                const odds = m.odds;

                list.innerHTML += `
                <div class="bg-slate-950 p-4 rounded-xl border border-gray-800 shadow-lg">
                  <div class="text-[10px] text-gray-500 font-bold mb-2">⚽ PREMIER LEAGUE</div>
                  <div class="text-xs font-black text-white mb-3">${home} V ${away}</div>
                  <div class="grid grid-cols-3 gap-2">
                    <button id="btn-${matchId}-home" onclick="selectOdd(${matchId}, 'home', ${odds.home})" class="bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center">
                        <span class="text-[9px] text-gray-500">1</span><span class="text-yellow-400 font-bold text-xs">${odds.home}</span>
                    </button>
                    <button id="btn-${matchId}-draw" onclick="selectOdd(${matchId}, 'draw', ${odds.draw})" class="bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center">
                        <span class="text-[9px] text-gray-500">X</span><span class="text-yellow-400 font-bold text-xs">${odds.draw}</span>
                    </button>
                    <button id="btn-${matchId}-away" onclick="selectOdd(${matchId}, 'away', ${odds.away})" class="bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center">
                        <span class="text-[9px] text-gray-500">2</span><span class="text-yellow-400 font-bold text-xs">${odds.away}</span>
                    </button>
                  </div>
                </div>`;
            });
        } catch (e) { list.innerHTML = "<p class='text-center text-red-500'>ችግር ተፈጥሯል!</p>"; }
    }

    function selectOdd(mId, pick, odd) {
        if (selectedBets[mId] && selectedBets[mId].pick === pick) {
            delete selectedBets[mId];
            document.getElementById(`btn-${mId}-${pick}`).classList.replace("bg-yellow-600", "bg-gray-900");
        } else {
            selectedBets[mId] = { matchId: mId, pick: pick, odd: odd };
            document.getElementById(`btn-${mId}-${pick}`).classList.replace("bg-gray-900", "bg-yellow-600");
        }
        updateBetSlip();
    }

    function updateBetSlip() {
        let count = Object.keys(selectedBets).length;
        let totalOdds = 1;
        for (let id in selectedBets) totalOdds *= selectedBets[id].odd;
        
        document.getElementById("slip-count").innerText = count;
        document.getElementById("slip-odds").innerText = totalOdds.toFixed(2);
        document.getElementById("possible-win").innerText = (parseFloat(document.getElementById("bet-amount").value || 0) * totalOdds).toFixed(2);
        document.getElementById("bet-slip-container").style.display = count > 0 ? "block" : "none";
    }

    async function placeBet() {
        const amount = document.getElementById("bet-amount").value;
        const response = await fetch('/api/sports/place_bet', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Telegram-Init-Data': initData},
            body: JSON.stringify({ user_id: userId, bet_amount: amount, selections: Object.values(selectedBets) })
        });
        const data = await response.json();
        alert(data.message);
        if(data.status === "success") window.location.reload();
    }

    fetchMatches();
  </script>
</body>
</html>
