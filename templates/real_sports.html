<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YegnaBet - Football Sportsbook</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: #07111f;
            color: #f8fafc;
            padding-bottom: 220px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background: linear-gradient(90deg, #0b3d6d, #144d8a);
            color: #fff;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: #f59e0b;
            color: #111827;
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: 18px;
        }

        .brand-title {
            font-weight: 800;
            font-size: 16px;
        }

        .brand-subtitle {
            font-size: 11px;
            color: #dbeafe;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-yellow {
            background: #f59e0b;
            color: #111827;
        }

        .btn-dark {
            background: #111827;
            color: #f8fafc;
            border: 1px solid #334155;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .search-input {
            flex: 1;
            border: 1px solid #334155;
            background: #111827;
            color: white;
            border-radius: 10px;
            padding: 10px 12px;
            outline: none;
        }

        .toggle-box {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #cbd5e1;
            font-size: 12px;
            white-space: nowrap;
        }

        .nav {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .tab, .market {
            border: 1px solid #334155;
            background: #111827;
            color: #cbd5e1;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .tab.active, .market.active {
            background: #f59e0b;
            color: #111827;
            border-color: #f59e0b;
        }

        .wallet-card {
            margin: 10px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #111827;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .quick-stakes {
            display: flex;
            gap: 8px;
            padding: 0 10px 10px 10px;
        }

        .stake-btn {
            flex: 1;
            background: #111827;
            color: #f8fafc;
            border: 1px solid #334155;
            padding: 8px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .hot-picks {
            padding: 0 10px 10px 10px;
            display: grid;
            gap: 8px;
        }

        .hot-card {
            background: linear-gradient(90deg, #111827, #1f2937);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 10px;
        }

        .hot-title {
            font-size: 12px;
            color: #f59e0b;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .hot-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #f8fafc;
        }

        .matches-list {
            padding: 0 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-card {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 10px;
        }

        .match-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 11px;
            color: #94a3b8;
        }

        .match-title {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .match-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .favorite-btn {
            border: none;
            background: transparent;
            color: #f59e0b;
            font-size: 18px;
            cursor: pointer;
        }

        .odds-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .odd-btn {
            border: 1px solid #334155;
            background: #1f2937;
            color: #f8fafc;
            border-radius: 10px;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }

        .odd-btn.selected {
            background: #f59e0b;
            color: #111827;
            border-color: #f59e0b;
        }

        .odd-btn.disabled {
            opacity: 0.45;
            pointer-events: none;
        }

        .loading-text {
            padding: 20px;
            text-align: center;
            color: #94a3b8;
        }

        .bet-slip {
            position: fixed;
            left: 8px;
            right: 8px;
            bottom: 8px;
            z-index: 100;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        .bet-slip-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #cbd5e1;
        }

        .slip-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 180px;
            overflow: auto;
        }

        .slip-item {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px;
            font-size: 12px;
            color: #cbd5e1;
        }

        .bet-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .bet-amount {
            flex: 1;
            border: 1px solid #334155;
            background: #111827;
            color: white;
            padding: 10px;
            border-radius: 10px;
            outline: none;
        }

        .bet-summary {
            font-size: 12px;
            color: #f59e0b;
            font-weight: 700;
        }

        .my-bets {
            display: none;
            padding: 10px;
        }

        .panel-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .ticket-card {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background: #1f2937;
            color: #cbd5e1;
            font-size: 11px;
            margin-left: 4px;
        }

        .muted {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="brand">
            <div class="brand-mark">Y</div>
            <div>
                <div class="brand-title">YegnaBet</div>
                <div class="brand-subtitle">Football • Premium Odds</div>
            </div>
        </div>
        <button class="btn btn-yellow" id="btn-my-bets">My Bets</button>
    </header>

    <div class="toolbar">
        <input class="search-input" id="search-input" type="text" placeholder="Search team or league..." />
        <label class="toggle-box">
            <input type="checkbox" id="favorites-toggle" />
            Favorites
        </label>
    </div>

    <div class="nav">
        <button class="tab active" id="tab-football" onclick="switchTab('football')">Football</button>
        <div style="flex:1"></div>
        <button class="market active" id="market-1x2" onclick="switchMarket('1x2')">1X2</button>
        <button class="market" id="market-dc" onclick="switchMarket('dc')">Double Chance</button>
    </div>

    <div class="wallet-card">
        <span>Wallet</span>
        <strong id="wallet-balance">0.00 ETB</strong>
    </div>

    <div class="quick-stakes">
        <button class="stake-btn" onclick="setStake(10)">10</button>
        <button class="stake-btn" onclick="setStake(20)">20</button>
        <button class="stake-btn" onclick="setStake(50)">50</button>
        <button class="stake-btn" onclick="setStake(100)">100</button>
    </div>

    <div id="hot-picks" class="hot-picks"></div>

    <div id="matches-list" class="matches-list"></div>

    <div id="my-bets-container" class="my-bets">
        <div class="panel-title">
            <strong>My Bets</strong>
            <button class="btn btn-dark" onclick="closeMyBets()">Close</button>
        </div>
        <div id="tickets-list"></div>
    </div>

    <div id="bet-slip-container" class="bet-slip">
        <div class="bet-slip-head">
            <span id="slip-count">0</span> selections
            <button class="btn btn-dark" id="clear-slip-btn">Clear</button>
        </div>
        <div id="slip-items" class="slip-items"></div>
        <div class="bet-actions">
            <input class="bet-amount" id="bet-amount" type="number" min="10" step="10" value="20" />
            <button class="btn btn-yellow" id="place-bet-btn">Place Bet</button>
        </div>
        <div class="bet-summary">Total odds: <span id="slip-odds">0.00</span> • Possible win: <span id="possible-win">0.00</span> ETB</div>
    </div>

    <script src="{{ url_for('static', filename='js/real_sports.js') }}"></script>
</body>
</html>
