<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Sports - የኛ ቤት</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-32">

  <header class="bg-slate-950 p-4 sticky top-0 z-50 flex items-center border-b border-gray-800">
    <a href="/" class="mr-4"><i class="fa-solid fa-arrow-left text-xl"></i></a>
    <h1 class="font-black text-lg tracking-widest text-yellow-400">REAL SPORTS</h1>
  </header>

  <main class="max-w-md mx-auto p-3">
    <div id="matches-list" class="space-y-3">
      <p class="text-center text-gray-500 py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i><br>ጨዋታዎችን በማምጣት ላይ...</p>
    </div>
  </main>

  <div id="bet-slip-container" class="fixed bottom-0 left-0 w-full bg-slate-950 border-t-2 border-yellow-500 p-4 shadow-2xl hidden z-50">
    <div class="flex justify-between text-xs font-bold text-gray-300 mb-2">
      <span>የተመረጡ: <span id="slip-count" class="text-white">0</span></span>
      <span>ጠቅላላ ኦድ: <span id="slip-odds" class="text-yellow-400">1.00</span></span>
    </div>
    <div class="text-[10px] text-green-400 mb-3 font-bold">ሊያሸንፉ የሚችሉት: <span id="possible-win" class="text-sm">0.00</span> ETB</div>
    <div class="flex gap-2">
      <input type="number" id="bet-amount" placeholder="መጠን (ETB)" min="10" oninput="updateBetSlip()" class="w-2/3 bg-gray-900 border border-gray-800 rounded-lg p-2 text-white font-bold text-sm outline-none">
      <button onclick="placeBet()" class="w-1/3 bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black py-2 rounded-lg text-xs transition">ወራረድ (BET)</button>
    </div>
  </div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const userId = tg.initDataUnsafe?.user?.id || "999999";
    const initData = tg.initData;
    let selectedBets = {};

    async function fetchMatches() {
        try {
            // 1. ጥሪውን ወደ odds ቀይረነዋል
            const res = await fetch('/api/sports/odds');
            const data = await res.json();
            const list = document.getElementById("matches-list");
            list.innerHTML = "";

            if (!data.matches || data.matches.length === 0) {
                list.innerHTML = "<p class='text-center text-gray-500'>ምንም ጨዋታ አልተገኘም</p>";
                return;
            }

            data.matches.forEach(m => {
                const mid = m.fixture.id;
                const home = m.fixture.teams.home.name;
                const away = m.fixture.teams.away.name;
                const odds = m.odds; // ከ Backend የመጣው እውነተኛ ኦድ

                list.innerHTML += `
                <div class="bg-slate-950 p-4 rounded-xl border border-gray-800 shadow-lg mb-3">
                    <div class="text-[9px] text-yellow-500 font-bold mb-1 uppercase">TOP LEAGUE</div>
                    <div class="text-xs font-black text-white mb-3">${home} V ${away}</div>
                    
                    <!-- 2. በተኖቹ ከእውነተኛው ኦድ እና ከ selectOdd ጋር ተገናኝተዋል -->
                    <div class="grid grid-cols-3 gap-2">
                        <button id="btn-${mid}-home" onclick="selectOdd(${mid}, 'home', ${odds.home}, '${home}')" class="bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center hover:border-yellow-500 transition">
                            <span class="text-[10px] text-gray-400">1</span>
                            <span class="text-xs font-bold text-yellow-400">${odds.home}</span>
                        </button>
                        <button id="btn-${mid}-draw" onclick="selectOdd(${mid}, 'draw', ${odds.draw}, 'Draw')" class="bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center hover:border-yellow-500 transition">
                            <span class="text-[10px] text-gray-400">X</span>
                            <span class="text-xs font-bold text-yellow-400">${odds.draw}</span>
                        </button>
                        <button id="btn-${mid}-away" onclick="selectOdd(${mid}, 'away', ${odds.away}, '${away}')" class="bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center hover:border-yellow-500 transition">
                            <span class="text-[10px] text-gray-400">2</span>
                            <span class="text-xs font-bold text-yellow-400">${odds.away}</span>
                        </button>
                    </div>
                </div>`;
            });
        } catch (error) {
            // 3. የ error መልዕክቱ በትክክለኛው ቦታ (በ catch ውስጥ) ገብቷል
            document.getElementById("matches-list").innerHTML = "<p class='text-center text-red-500 mt-10'>ስህተት ተፈጥሯል! እባክዎ ኢንተርኔትዎን ያረጋግጡ።</p>";
            console.error(error);
        }
    }

    function selectOdd(mid, pick, odd, teamName) {
        // ተጠቃሚው በአንድ ጨዋታ ላይ ምርጫውን ከቀየረ (ለምሳሌ ከ 1 ወደ X) የድሮውን ማጥፋት
        if (selectedBets[mid] && selectedBets[mid].pick !== pick) {
            const oldPick = selectedBets[mid].pick;
            document.getElementById(`btn-${mid}-${oldPick}`).className = "bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center hover:border-yellow-500 transition";
        }

        // መምረጥ እና ማጥፋት (Toggle)
        if (selectedBets[mid] && selectedBets[mid].pick === pick) {
            delete selectedBets[mid];
            document.getElementById(`btn-${mid}-${pick}`).className = "bg-gray-900 border border-gray-800 py-2 rounded-lg flex flex-col items-center hover:border-yellow-500 transition";
        } else {
            selectedBets[mid] = { matchId: mid, pick: pick, odd: odd, team: teamName };
            document.getElementById(`btn-${mid}-${pick}`).className = "bg-yellow-600 border border-yellow-500 py-2 rounded-lg flex flex-col items-center";
        }
        updateBetSlip();
    }

    function updateBetSlip() {
        let count = Object.keys(selectedBets).length;
        let totalOdds = 1;
        for (let id in selectedBets) totalOdds *= selectedBets[id].odd;
        
        document.getElementById("slip-count").innerText = count;
        // ኦዱን ወደ ሁለት ዴሲማል (0.00) ማስተካከል
        document.getElementById("slip-odds").innerText = count > 0 ? totalOdds.toFixed(2) : "1.00";
        
        const amount = parseFloat(document.getElementById("bet-amount").value || 0);
        document.getElementById("possible-win").innerText = (amount * (count > 0 ? totalOdds : 0)).toFixed(2);
        
        document.getElementById("bet-slip-container").style.display = count > 0 ? "block" : "none";
    }

    async function placeBet() {
        const amount = parseFloat(document.getElementById("bet-amount").value);
        if (!amount || amount < 10) {
            alert("እባክዎ ቢያንስ 10 ብር ያስገቡ!");
            return;
        }

        const response = await fetch('/api/sports/place_bet', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-Telegram-Init-Data': initData},
            body: JSON.stringify({ user_id: userId, bet_amount: amount, selections: Object.values(selectedBets) })
        });
        const data = await response.json();
        alert(data.message);
        if(data.status === "success") window.location.reload();
    }

    document.addEventListener("DOMContentLoaded", fetchMatches);
  </script>
</body>
</html>
