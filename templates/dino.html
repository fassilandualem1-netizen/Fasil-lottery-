<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዲኖ ራን (Dino Run) - ቤቲንግ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* ጀርባ መመለሻ በተን */
        .back-nav {
            align-self: flex-start;
            font-size: 1.1rem;
            color: #aaa;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .back-nav:hover {
            color: #e94560;
        }

        h1 {
            color: #e94560;
            margin: 5px 0;
            font-size: 1.8rem;
        }

        p {
            color: #aaa;
            margin: 0 0 15px 0;
            font-size: 0.95rem;
            text-align: center;
        }

        /* የጨዋታው መስኮት */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px; /* ለስልክ እንዲመች በትንሹ የተስተካከለ */
            background-color: #161625;
            border: 3px solid #e94560;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgba(233, 69, 96, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: linear-gradient(to bottom, #111122, #1a1a3a);
        }

        #multiplierDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.8rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        /* የቁጥጥር ፓነል */
        .controls-panel {
            width: 100%;
            max-width: 500px;
            margin-top: 15px;
            background-color: #0f0f1e;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .bet-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bet-group label {
            font-size: 0.9rem;
            color: #8b8baf;
        }

        /* Stepper (+ እና -) አቀማመጥ */
        .bet-stepper {
            display: flex;
            align-items: center;
            background-color: #161625;
            border: 2px solid #30304a;
            border-radius: 8px;
            overflow: hidden;
            justify-content: space-between;
        }

        .stepper-btn {
            background-color: #25253b;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .stepper-btn:hover {
            background-color: #3f3f5a;
        }

        .bet-stepper input {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            width: 100px;
            outline: none;
        }

        .currency {
            color: #8b8baf;
            font-weight: bold;
            padding-right: 15px;
        }

        /* በተኖች */
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btnStart {
            background-color: #e94560;
            color: white;
        }

        #btnStart:hover {
            background-color: #ff5e7e;
            box-shadow: 0px 0px 15px rgba(233, 69, 96, 0.4);
        }

        #btnCashout {
            background-color: #00ffcc;
            color: #111122;
            display: none;
        }

        #btnCashout:hover {
            background-color: #33ffdd;
            box-shadow: 0px 0px 15px rgba(0, 255, 204, 0.4);
        }

        .btn:disabled {
            background-color: #444455 !important;
            color: #888899 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="back-nav" onclick="window.location.href='/'">
        <i class="fas fa-arrow-left"></i> ወደ ማውጫ ተመለስ
    </div>

    <h1>ዲኖ ራን (Dino Run) 🦖⚡</h1>
    <p>መሰናክሎችን እየዘለሉ Multiplier ሲጨምር Cash Out ያድርጉ!</p>

    <div id="gameContainer">
        <div id="multiplierDisplay">1.00x</div>
        <canvas id="gameCanvas" width="800" height="300"></canvas>
    </div>

    <div class="controls-panel">
        <div class="bet-group">
            <label for="betAmount">የውርርድ መጠን (ብር)</label>
            <div class="bet-stepper">
                <button type="button" class="stepper-btn" onclick="adjustBet(-2)">-</button>
                <input type="number" id="betAmount" value="10" min="2" step="2" readonly>
                <span class="currency">ETB</span>
                <button type="button" class="stepper-btn" onclick="adjustBet(2)">+</button>
            </div>
        </div>

        <div class="button-group">
            <button id="btnStart" class="btn">ውርርድ ፍጠር (Start)</button>
            <button id="btnCashout" class="btn">Cash Out 💰</button>
        </div>
    </div>

    <script>
        // የብር መጨመሪያና መቀነሻ ስክሪፕት (Stepper)
        function adjustBet(amount) {
            // ጨዋታው ከተጀመረ በተኑ እንዳይሰራ መከልከል
            if (document.getElementById("betAmount").disabled) return;
            
            let betInput = document.getElementById("betAmount");
            let currentVal = parseInt(betInput.value) || 10;
            let newVal = currentVal + amount;
            
            if (newVal >= 2) { // አነስተኛ ውርርድ 2 ብር እንዲሆን
                betInput.value = newVal;
            }
        }
    </script>

    <script src="{{ url_for('static', filename='js/dino.js') }}"></script>
</body>
</html>
