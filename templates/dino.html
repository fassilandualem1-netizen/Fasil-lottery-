<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዲኖ ራን (Dino Run) - ቤቲንግ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
        }

        /* የጨዋታው መስኮት (Canvas) ማሳያ */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            background-color: #161625;
            border: 4px solid #e94560;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 20px rgba(233, 69, 96, 0.3);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: linear-gradient(to bottom, #111122, #1a1a3a);
        }

        /* የMultiplier ማሳያ */
        #multiplierDisplay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        /* የቁጥጥር ፓነል (Betting Panel) */
        .controls-panel {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            background-color: #0f0f1e;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .bet-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bet-group label {
            font-size: 0.9rem;
            color: #8b8baf;
        }

        .bet-input-wrapper {
            display: flex;
            align-items: center;
            background-color: #161625;
            border: 2px solid #30304a;
            border-radius: 5px;
            padding: 5px 10px;
        }

        .bet-input-wrapper input {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100px;
            outline: none;
        }

        /* በተኖች */
        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btnStart {
            background-color: #e94560;
            color: white;
        }

        #btnStart:hover {
            background-color: #ff5e7e;
            box-shadow: 0px 0px 15px rgba(233, 69, 96, 0.4);
        }

        #btnCashout {
            background-color: #00ffcc;
            color: #111122;
            display: none; /* ጨዋታው ሲጀምር ብቻ ነው የሚታየው */
        }

        #btnCashout:hover {
            background-color: #33ffdd;
            box-shadow: 0px 0px 15px rgba(0, 255, 204, 0.4);
        }

        .btn:disabled {
            background-color: #444455 !important;
            color: #888899 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <h1>ዲኖ ራን (Dino Run) 🦖⚡</h1>
    <p>መሰናክሎችን እየዘለሉ Multiplier ሲጨምር በትክክለኛው ሰዓት Cash Out ያድርጉ!</p>

    <div id="gameContainer">
        <div id="multiplierDisplay">1.00x</div>
        <canvas id="gameCanvas" width="800" height="300"></canvas>
    </div>

    <div class="controls-panel">
        <div class="bet-group">
            <label for="betAmount">የውርርድ መጠን (ብር)</label>
            <div class="bet-input-wrapper">
                <input type="number" id="betAmount" value="10" min="1">
                <span>ETB</span>
            </div>
        </div>

        <div class="button-group">
            <button id="btnStart" class="btn">ውርርድ ፍጠር (Start)</button>
            <button id="btnCashout" class="btn">Cash Out 💰</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dino.js') }}"></script>
</body>
</html>
