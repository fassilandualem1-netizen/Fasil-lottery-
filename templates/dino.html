<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዲኖ ራን (Dino Run) 🦖⚡</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121225;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .back-nav {
            align-self: flex-start;
            font-size: 1.1rem;
            color: #aaa;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        /* ሙሉ ስክሪን የሚይዝ የጨዋታ አካል */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 600px;
            background-color: #16162d;
            border: 3px solid #e94560;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0px 0px 25px rgba(233, 69, 96, 0.4);
            aspect-ratio: 16 / 9; /* የቪዲዮ ሬሾ እንዲኖረው */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #multiplierDisplay {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.7);
            z-index: 5;
        }

        /* የቁጥጥር ፓነል */
        .controls-panel {
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            background-color: #0f0f1e;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .bet-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .bet-group label {
            font-size: 0.95rem;
            color: #8b8baf;
            font-weight: bold;
        }

        .bet-stepper {
            display: flex;
            align-items: center;
            background-color: #161625;
            border: 2px solid #30304a;
            border-radius: 10px;
            overflow: hidden;
            justify-content: space-between;
        }

        .stepper-btn {
            background-color: #25253b;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .stepper-btn:hover {
            background-color: #3f3f5a;
        }

        .bet-stepper input {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            width: 80px;
            outline: none;
        }

        .currency {
            color: #00ffcc;
            font-weight: bold;
            padding-right: 15px;
            font-size: 1.1rem;
        }

        /* ዋና ቁልፎች */
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        #btnStart {
            background-color: #e94560;
            color: white;
        }

        #btnStart:hover {
            background-color: #ff5e7e;
        }

        #btnCashout {
            background-color: #00ffcc;
            color: #111122;
            display: none;
        }

        #btnCashout:hover {
            background-color: #33ffdd;
        }

        .btn:disabled {
            background-color: #444455 !important;
            color: #888899 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="back-nav" onclick="window.location.href='/'">
        <i class="fas fa-arrow-left"></i> ወደ ማውጫ ተመለስ
    </div>

    <div id="gameContainer">
        <div id="multiplierDisplay">1.00x</div>
        <canvas id="gameCanvas" width="800" height="450"></canvas> </div>

    <div class="controls-panel">
        <div class="bet-group">
            <label for="betAmount">የውርርድ መጠን (ብር)</label>
            <div class="bet-stepper">
                <button type="button" class="stepper-btn" onclick="adjustBet(-2)">-</button>
                <input type="number" id="betAmount" value="10" min="2" step="2" readonly>
                <span class="currency">ETB</span>
                <button type="button" class="stepper-btn" onclick="adjustBet(2)">+</button>
            </div>
        </div>

        <div class="button-group">
            <button id="btnStart" class="btn">ውርርድ ፍጠር (Start)</button>
            <button id="btnCashout" class="btn">Cash Out 💰</button>
        </div>
    </div>

    <script>
        function adjustBet(amount) {
            let betInput = document.getElementById("betAmount");
            if (betInput.disabled) return;
            let currentVal = parseInt(betInput.value) || 10;
            let newVal = currentVal + amount;
            if (newVal >= 2) {
                betInput.value = newVal;
            }
        }
    </script>
    <script src="{{ url_for('static', filename='js/dino.js') }}"></script>
</body>
</html>
