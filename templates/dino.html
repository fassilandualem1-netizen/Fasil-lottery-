<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ሮኬት ክራሽ (Rocket Crash) 🚀⚡</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b16;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header-nav {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        .back-nav {
            font-size: 1.1rem;
            color: #aaa;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wallet-display {
            font-weight: bold;
            color: #00ffcc;
            background: #14142b;
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid #2d2d44;
        }

        /* ሮኬት የሚበርበት ስክሪን */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            background-color: #0f0f25;
            border: 3px solid #00d2d3; /* ወደ አውሮፕላኑ ቀለም ተቀይሯል */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0px 0px 30px rgba(0, 210, 211, 0.3);
            aspect-ratio: 16 / 10;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #multiplierDisplay {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.8);
            z-index: 5;
        }

        /* History Bar */
        #historyBar {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 8px;
            padding: 10px 0;
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        #historyBar::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .history-chip {
            padding: 5px 12px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            background-color: #333344;
        }

        /* መቆጣጠሪያ ፎርም */
        .controls-panel {
            width: 100%;
            max-width: 500px;
            background-color: #14142b;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
            border: 1px solid #2d2d44;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .input-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-box label {
            font-size: 0.85rem;
            color: #8b8baf;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ስቴፐር */
        .stepper {
            display: flex;
            align-items: center;
            background-color: #1a1a35;
            border: 2px solid #2d2d44;
            border-radius: 10px;
            overflow: hidden;
            justify-content: space-between;
            height: 45px;
        }

        .stepper-btn {
            background-color: #25254a;
            color: white;
            border: none;
            width: 40px;
            height: 100%;
            font-size: 1.4rem;
            cursor: pointer;
        }

        .stepper input {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.15rem;
            font-weight: bold;
            text-align: center;
            width: 60px;
            outline: none;
        }

        .currency {
            color: #00ffcc;
            font-weight: bold;
            font-size: 0.9rem;
            padding-right: 10px;
        }

        /* Auto Cashout Input */
        .auto-input {
            background-color: #1a1a35;
            border: 2px solid #2d2d44;
            border-radius: 10px;
            color: #fff;
            font-size: 1.15rem;
            font-weight: bold;
            text-align: center;
            height: 41px;
            outline: none;
        }
        .auto-input:disabled {
            color: #555;
            border-color: #1a1a35;
        }

        /* ትልቁ የድርጊት በተን */
        .action-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.4rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        /* የButton ሁኔታዎች (States) */
        .bet-mode { background-color: #e94560; color: white; }
        .cashout-mode { background-color: #00ffcc; color: #0b0b16; }
        .waiting-mode { background-color: #ff9f43; color: white; }
        .win-mode { background-color: #10ac84; color: white; }

        .action-btn:disabled {
            background-color: #333344 !important;
            color: #777788 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <div class="back-nav" onclick="window.location.href='/'">
            <i class="fas fa-arrow-left"></i> ተመለስ
        </div>
        <div class="wallet-display">
            <span id="balanceDisplay">0.00</span> ETB
        </div>
    </div>

    <div id="gameContainer">
        <div id="multiplierDisplay">1.00x</div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

    <div id="historyBar">
        <!-- የቅርብ ጊዜ ክራሽ ሂስቶሪዎች እዚህ ይገባሉ -->
    </div>

    <div class="controls-panel">
        <div class="flex-row">
            <div class="input-box">
                <label>የውርርድ መጠን</label>
                <div class="stepper">
                    <button type="button" class="stepper-btn" onclick="adjustBet(-2)">-</button>
                    <input type="number" id="betAmount" value="10" min="2" step="2" readonly>
                    <span class="currency">ETB</span>
                    <button type="button" class="stepper-btn" onclick="adjustBet(2)">+</button>
                </div>
            </div>

            <div class="input-box">
                <label>
                    Auto Cash Out 
                    <span style="display:flex; align-items:center; gap:5px; color:#fff;">
                        <input type="checkbox" id="autoCashoutToggle"> ON
                    </span>
                </label>
                <input type="number" id="autoCashout" class="auto-input" value="2.0" min="1.1" step="0.1" disabled>
            </div>
        </div>

        <button id="btnAction" class="action-btn bet-mode">ውርርድ ፍጠር (START)</button>
    </div>

    <script>
        // የውርርድ መጠን ማስተካከያ (ስቴፐር)
        function adjustBet(amount) {
            let betInput = document.getElementById("betAmount");
            if (document.getElementById("btnAction").disabled || document.querySelector('.stepper-btn').disabled) return;
            let currentVal = parseInt(betInput.value) || 10;
            let newVal = currentVal + amount;
            if (newVal >= 2) {
                betInput.value = newVal;
            }
        }
    </script>
    
    <!-- ይህ የJavascript ፋይል ከታች ባለው ኮድ መተካት አለበት -->
    <script src="{{ url_for('static', filename='js/dino.js') }}"></script>
</body>
</html>
