<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>አቪዬተር (Aviator) 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .header-nav {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: #1a1a1a;
            box-sizing: border-box;
            border-bottom: 1px solid #333;
        }

        .back-btn {
            color: #fff;
            font-size: 1.2rem;
            margin-right: 15px;
            cursor: pointer;
            text-decoration: none;
        }

        .logo { font-size: 1.5rem; font-weight: 900; color: #e50b2c; font-style: italic; }
        .wallet-display { font-weight: bold; color: #28a745; font-size: 1.1rem; }

        /* History Bar */
        #historyBar {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            background-color: #0d0d0d;
            overflow-x: auto;
            white-space: nowrap;
            box-sizing: border-box;
            scrollbar-width: none;
        }
        #historyBar::-webkit-scrollbar { display: none; }
        .history-chip {
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.85rem;
            background-color: #1e1e1e;
            border: 1px solid #333;
        }
        .color-blue { color: #3498db; }
        .color-purple { color: #9b59b6; }
        .color-pink { color: #e84393; }

        /* Game Area */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            background-color: #111;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            border-bottom: 3px solid #e50b2c;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
        }
        canvas { display: block; width: 100%; height: 100%; }

        #multiplierDisplay {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffffff;
            z-index: 5;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            transition: color 0.2s;
        }

        #statusText {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: #e50b2c;
            font-weight: bold;
            z-index: 5;
            display: none;
        }

        /* Controls Container (Dual Bets) */
        .controls-container {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bet-panel {
            background-color: #242424;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #333;
        }

        .panel-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .tab {
            background: none;
            border: none;
            color: #888;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .tab.active { background-color: #333; color: #fff; }

        .panel-body {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        /* Left Side: Inputs */
        .input-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stepper {
            display: flex;
            align-items: center;
            background-color: #111;
            border: 1px solid #444;
            border-radius: 8px;
            height: 40px;
        }
        .stepper-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            width: 40px;
            cursor: pointer;
        }
        .stepper input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .quick-bets {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        .quick-btn {
            background-color: #111;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 6px;
            padding: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: bold;
        }

        .auto-section {
            display: none; 
            background-color: #1a1a1a;
            padding: 8px;
            border-radius: 8px;
            margin-top: 5px;
            align-items: center;
            justify-content: space-between;
            border: 1px dashed #444;
        }
        .auto-section label { font-size: 0.85rem; color: #aaa; font-weight: bold; }
        .auto-section input {
            background: #111; border: 1px solid #444; color: #fff;
            padding: 5px; border-radius: 5px; width: 70px;
            text-align: center; font-weight: bold; font-size: 1rem; outline: none;
        }

        /* Right Side: Big Button */
        .action-section {
            flex: 1;
            display: flex;
        }
        .action-btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        .action-btn:active { transform: scale(0.98); }

        .btn-bet { background-color: #28a745; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 2px 5px rgba(0,0,0,0.5); }
        .btn-cancel { background-color: #cb2027; }
        .btn-cashout { background-color: #d35400; }
        .btn-disabled { background-color: #333 !important; color: #666 !important; cursor: not-allowed; }

        .btn-subtext { font-size: 0.8rem; font-weight: normal; margin-top: 2px; }
 
        .mode-btn {
  padding: 8px 16px;
  border: 1px solid #e50b2c;
  background-color: transparent;
  color: #fff;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
}

/* ሲመረጥ የሚኖረው ቀለማት */
.mode-btn.active-mode {
  background-color: #e50b2c;
  box-shadow: 0 0 8px rgba(229, 11, 44, 0.6);
}
    </style>
</head>
<body>

    <div class="header-nav">
        <div style="display: flex; align-items: center;">
            <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="logo">Aviator</div>
        </div>
        <div class="wallet-display">
            <span id="balanceDisplay">...</span> ETB
            <i class="fas fa-bars" style="color: #666; margin-left: 10px; cursor: pointer;"></i>
        </div>
    </div>

    <div id="historyBar"></div>

    <div id="gameContainer">
        <div id="multiplierDisplay">1.00x</div>
        <div id="statusText">WAITING FOR NEXT ROUND</div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>

<!-- የ Demo/Real መቀያየሪያ ዲዛይን -->
<div class="mode-container" style="display: flex; justify-content: center; gap: 10px; margin: 10px 0;">
  <button id="btnDemoMode" class="mode-btn active-mode" onclick="switchGameMode('demo')">
    🧪 Demo Mode
  </button>
  <button id="btnRealMode" class="mode-btn" onclick="switchGameMode('real')">
    💰 Real Mode
  </button>
</div>
</div>

    <div class="controls-container">
        <!-- Panel 1 -->
        <div class="bet-panel" id="panel1">
            <div class="panel-tabs">
                <button class="tab active" id="tabBet1" onclick="switchTab(1, 'bet')">Bet</button>
                <button class="tab" id="tabAuto1" onclick="switchTab(1, 'auto')">Auto</button>
            </div>
            <div class="panel-body">
                <div class="input-section">
                    <div class="stepper">
                        <button class="stepper-btn" onclick="adjustBet(1, -5)">-</button>
                        <input type="number" id="betInput1" value="20" min="2" step="1">
                        <button class="stepper-btn" onclick="adjustBet(1, 5)">+</button>
                    </div>
                    <div class="quick-bets">
                        <button class="quick-btn" onclick="setBet(1, 20)">20</button>
                        <button class="quick-btn" onclick="setBet(1, 40)">40</button>
                        <button class="quick-btn" onclick="setBet(1, 80)">80</button>
                        <button class="quick-btn" onclick="setBet(1, 400)">400</button>
                    </div>
                    <div id="autoSection1" class="auto-section">
                        <label>Auto Cashout:</label>
                        <input type="number" id="autoCashoutInput1" value="2.0" step="0.1" min="1.1">
                    </div>
                </div>
                <div class="action-section">
                    <button id="btnAction1" class="action-btn btn-bet" onclick="handleAction(1)">
                        BET <div class="btn-subtext" id="btnSub1">20.00 ETB</div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Panel 2 -->
        <div class="bet-panel" id="panel2">
            <div class="panel-tabs">
                <button class="tab active" id="tabBet2" onclick="switchTab(2, 'bet')">Bet</button>
                <button class="tab" id="tabAuto2" onclick="switchTab(2, 'auto')">Auto</button>
            </div>
            <div class="panel-body">
                <div class="input-section">
                    <div class="stepper">
                        <button class="stepper-btn" onclick="adjustBet(2, -5)">-</button>
                        <input type="number" id="betInput2" value="20" min="2" step="1">
                        <button class="stepper-btn" onclick="adjustBet(2, 5)">+</button>
                    </div>
                    <div class="quick-bets">
                        <button class="quick-btn" onclick="setBet(2, 20)">20</button>
                        <button class="quick-btn" onclick="setBet(2, 40)">40</button>
                        <button class="quick-btn" onclick="setBet(2, 80)">80</button>
                        <button class="quick-btn" onclick="setBet(2, 400)">400</button>
                    </div>
                    <div id="autoSection2" class="auto-section">
                        <label>Auto Cashout:</label>
                        <input type="number" id="autoCashoutInput2" value="2.0" step="0.1" min="1.1">
                    </div>
                </div>
                <div class="action-section">
                    <button id="btnAction2" class="action-btn btn-bet" onclick="handleAction(2)">
                        BET <div class="btn-subtext" id="btnSub2">20.00 ETB</div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dino.js') }}?v=3"></script>
</body>
</html>
