<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gasha Bet - Aviator</title>
    <!-- የ Socket.IO ላይብረሪ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
    
    <style>
        /* ==========================================
           🎨 የ Aviator ጨለማ እና ዘመናዊ ዲዛይን (CSS)
           ========================================== */
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; user-select: none; }
        body { background-color: #1a1a24; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* 1. ሄደር እና ባላንስ */
        .header { display: flex; justify-content: space-between; padding: 10px 15px; background-color: #121219; border-bottom: 1px solid #2a2a35; }
        .logo { color: #e50b2c; font-weight: 900; font-size: 20px; font-style: italic; }
        .balance { color: #28a745; font-weight: bold; font-size: 16px; }

        /* 2. የክራሽ ታሪክ (History Tape) */
        .history-bar { display: flex; gap: 8px; padding: 5px 15px; overflow-x: auto; background-color: #1a1a24; white-space: nowrap; }
        .history-item { font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 12px; background: rgba(255,255,255,0.05); }
        .hist-red { color: #e50b2c; } .hist-purple { color: #c155ff; } .hist-blue { color: #3498db; }

        /* 3. ዋናው የጨዋታ ማሳያ (Game Screen) */
        .game-screen { flex-grow: 1; background: radial-gradient(circle, #331525 0%, #111116 100%); position: relative; display: flex; justify-content: center; align-items: center; min-height: 250px; margin: 10px; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        #multiplier-text { font-size: 80px; font-weight: 900; z-index: 2; text-shadow: 2px 4px 10px rgba(0,0,0,0.5); }
        .plane-anim { position: absolute; width: 100%; height: 100%; opacity: 0.1; background: repeating-linear-gradient(45deg, transparent, transparent 10px, #fff 10px, #fff 20px); }

        /* 4. የውርርድ ፓኔሎች (Bet Panels Container) */
        .panels-container { padding: 0 10px 10px 10px; display: flex; flex-direction: column; gap: 10px; }
        
        /* እያንዳንዱ ፓኔል */
        .bet-panel { background-color: #21212c; border-radius: 12px; padding: 10px; border: 1px solid #2a2a35; }
        
        /* ታቦች (Bet vs Auto) */
        .panel-tabs { display: flex; justify-content: center; margin-bottom: 10px; background: #16161e; border-radius: 20px; padding: 2px; width: fit-content; margin-left: auto; margin-right: auto; }
        .panel-tab { padding: 5px 20px; font-size: 12px; font-weight: bold; color: #888; border-radius: 18px; cursor: pointer; transition: 0.3s; }
        .panel-tab.active { background-color: #2a2a35; color: white; }

        /* የብር ማስገቢያ እና ዋና በተን (Split Layout) */
        .panel-body { display: flex; gap: 10px; }
        
        /* ግራ በኩል - የብር ማስተካከያ */
        .amount-controls { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .input-group { display: flex; align-items: center; background: #16161e; border-radius: 8px; padding: 2px; border: 1px solid #333; }
        .btn-stepper { width: 30px; height: 30px; border-radius: 50%; border: none; background: #2a2a35; color: white; font-weight: bold; cursor: pointer; }
        .amount-input { flex: 1; width: 100%; text-align: center; background: transparent; border: none; color: white; font-size: 16px; font-weight: bold; outline: none; }
        
        /* ፈጣን ብሮች */
        .quick-amounts { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-quick { background: #16161e; border: 1px solid #333; color: #aaa; border-radius: 4px; padding: 5px; font-size: 12px; cursor: pointer; }
        
        /* ቀኝ በኩል - ትልቁ በተን */
        .btn-action { flex: 1; border: none; border-radius: 12px; font-size: 20px; font-weight: 900; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.2; box-shadow: inset 0px -4px 0px rgba(0,0,0,0.2); transition: 0.1s; }
        .btn-action:active { transform: translateY(2px); box-shadow: inset 0px -2px 0px rgba(0,0,0,0.2); }
        .btn-green { background-color: #28a745; color: white; }
        .btn-red { background-color: #dc3545; color: white; }
        .btn-yellow { background-color: #ffc107; color: black; }
        
        /* የ Auto ውርርድ መቆጣጠሪያዎች (መጀመሪያ ይደበቃሉ) */
        .auto-controls { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #2a2a35; font-size: 12px; color: #aaa; }
        .auto-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .toggle-switch { width: 40px; height: 20px; background: #16161e; border-radius: 10px; position: relative; cursor: pointer; border: 1px solid #333; }
        .toggle-switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: #888; border-radius: 50%; top: 1px; left: 2px; transition: 0.3s; }
        .toggle-switch.active { background: #28a745; border-color: #28a745; }
        .toggle-switch.active::after { background: white; transform: translateX(20px); }
        .auto-input { width: 60px; background: #16161e; border: 1px solid #333; color: white; border-radius: 4px; padding: 2px 5px; text-align: center; outline: none; }
    </style>
</head>
<body>

    <!-- 1. Header -->
    <header class="header">
        <div class="logo">Aviator</div>
        <div class="balance">3.00 ETB</div>
    </header>

    <!-- 2. History Tape -->
    <div class="history-bar">
        <span class="history-item hist-red">1.28x</span>
        <span class="history-item hist-purple">2.68x</span>
        <span class="history-item hist-blue">1.44x</span>
        <span class="history-item hist-purple">4.36x</span>
        <span class="history-item hist-blue">2.02x</span>
        <span class="history-item hist-red">1.91x</span>
    </div>

    <!-- 3. Game Screen -->
    <div class="game-screen">
        <div class="plane-anim"></div>
        <!-- ይህ ቁጥር በ aviator.js ነው የሚቀየረው -->
        <div id="multiplier-text">1.00x</div> 
    </div>

    <!-- 4. Bet Panels -->
    <div class="panels-container">
        
        <!-- ================= PANEL 1 ================= -->
        <div class="bet-panel" id="panel-1">
            <!-- Tabs -->
            <div class="panel-tabs">
                <div class="panel-tab active" id="p1-tab-bet">Bet</div>
                <div class="panel-tab" id="p1-tab-auto">Auto</div>
            </div>
            
            <div class="panel-body">
                <!-- Left: Controls -->
                <div class="amount-controls">
                    <div class="input-group">
                        <button class="btn-stepper" id="p1-minus">-</button>
                        <input type="number" class="amount-input" id="p1-amount" value="20.00" readonly>
                        <button class="btn-stepper" id="p1-plus">+</button>
                    </div>
                    <div class="quick-amounts">
                        <button class="btn-quick" onclick="setAmount('p1', 20)">20</button>
                        <button class="btn-quick" onclick="setAmount('p1', 40)">40</button>
                        <button class="btn-quick" onclick="setAmount('p1', 80)">80</button>
                        <button class="btn-quick" onclick="setAmount('p1', 400)">400</button>
                    </div>
                </div>
                <!-- Right: Action Button -->
                <button class="btn-action btn-green" id="p1-btn">
                    <span>Bet</span>
                    <span style="font-size: 14px; font-weight: 400;" id="p1-btn-text">20.00 ETB</span>
                </button>
            </div>

            <!-- Auto Controls (Hidden by default) -->
            <div class="auto-controls" id="p1-auto-section">
                <div class="auto-row">
                    <span>Auto Bet</span>
                    <div class="toggle-switch" id="p1-auto-bet-toggle"></div>
                </div>
                <div class="auto-row">
                    <span>Auto Cash Out</span>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="number" class="auto-input" id="p1-auto-cashout-val" value="2.00" step="0.1">
                        <div class="toggle-switch" id="p1-auto-cashout-toggle"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= PANEL 2 ================= -->
        <div class="bet-panel" id="panel-2">
            <!-- ይሄ ልክ እንደ ፓኔል 1 ነው፣ አይዲው (ID) ብቻ 'p2' ይሆናል -->
            <div class="panel-tabs">
                <div class="panel-tab active" id="p2-tab-bet">Bet</div>
                <div class="panel-tab" id="p2-tab-auto">Auto</div>
            </div>
            
            <div class="panel-body">
                <div class="amount-controls">
                    <div class="input-group">
                        <button class="btn-stepper" id="p2-minus">-</button>
                        <input type="number" class="amount-input" id="p2-amount" value="20.00" readonly>
                        <button class="btn-stepper" id="p2-plus">+</button>
                    </div>
                    <div class="quick-amounts">
                        <button class="btn-quick" onclick="setAmount('p2', 20)">20</button>
                        <button class="btn-quick" onclick="setAmount('p2', 40)">40</button>
                        <button class="btn-quick" onclick="setAmount('p2', 80)">80</button>
                        <button class="btn-quick" onclick="setAmount('p2', 400)">400</button>
                    </div>
                </div>
                <button class="btn-action btn-green" id="p2-btn">
                    <span>Bet</span>
                    <span style="font-size: 14px; font-weight: 400;" id="p2-btn-text">20.00 ETB</span>
                </button>
            </div>

            <div class="auto-controls" id="p2-auto-section">
                <div class="auto-row">
                    <span>Auto Bet</span>
                    <div class="toggle-switch" id="p2-auto-bet-toggle"></div>
                </div>
                <div class="auto-row">
                    <span>Auto Cash Out</span>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="number" class="auto-input" id="p2-auto-cashout-val" value="2.00" step="0.1">
                        <div class="toggle-switch" id="p2-auto-cashout-toggle"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

        <!-- ከታች ያለውን የጃቫስክሪፕት ክፍል ሙሉ በሙሉ ተካው -->
    <script>
        // ==========================================
        // 🌐 1. የ Socket.IO እና ቴሌግራም ኮኔክሽን ማሰሪያ
        // ==========================================
        const socket = io(); 
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();
        
        // የዩዘር አይዲ ከቴሌግራም ማግኘት (ከሌለ ቴስት ማድረጊያ 999999)
        const userId = tg?.initDataUnsafe?.user?.id || "999999";

        // የጨዋታው ወቅታዊ ሁኔታ ማከማቻ (Client State)
        let gameState = { status: "WAITING", multiplier: 1.00 };

        // ==========================================
        // 🎮 2. የውርርድ ፓነል ክላስ (Panel Logic Engine)
        // ==========================================
        class BetPanel {
            constructor(prefix) {
                this.prefix = prefix;
                this.amount = 20.00;
                this.betState = "NONE"; // NONE, BETTING (ዙሩን በመጠባበቅ ላይ), IN_GAME (እየበረረ ያለ), CASHED_OUT
                this.isAutoBet = false;
                this.isAutoCashout = false;
                this.autoCashoutVal = 2.00;

                this.initUI();
            }

            initUI() {
                this.input = document.getElementById(`${this.prefix}-amount`);
                this.btnText = document.getElementById(`${this.prefix}-btn-text`);
                this.btnAction = document.getElementById(`${this.prefix}-btn`);
                this.btnLabel = this.btnAction.querySelector('span:first-child');

                // የፕላስ / ማይነስ በተኖች
                document.getElementById(`${this.prefix}-plus`).addEventListener('click', () => {
                    if (this.betState === "NONE") this.setAmount(this.amount + 10);
                });
                document.getElementById(`${this.prefix}-minus`).addEventListener('click', () => {
                    if (this.betState === "NONE") this.setAmount(Math.max(10, this.amount - 10));
                });

                // ዋናውን የ Bet / Cash Out በተን መጫን
                this.btnAction.addEventListener('click', () => this.handleAction());

                // ታቦች (Bet vs Auto)
                let tabBet = document.getElementById(`${this.prefix}-tab-bet`);
                let tabAuto = document.getElementById(`${this.prefix}-tab-auto`);
                let autoSection = document.getElementById(`${this.prefix}-auto-section`);

                tabBet.addEventListener('click', () => {
                    tabBet.classList.add('active');
                    tabAuto.classList.remove('active');
                    autoSection.style.display = 'none';
                });

                tabAuto.addEventListener('click', () => {
                    tabAuto.classList.add('active');
                    tabBet.classList.remove('active');
                    autoSection.style.display = 'block';
                });

                // የቶግል ማብሪያ ማጥፊያዎች (Toggle Switches)
                document.getElementById(`${this.prefix}-auto-bet-toggle').addEventListener('click', function() {
                    this.classList.toggle('active');
                    window[`panel_${prefix}`].isAutoBet = this.classList.contains('active');
                });

                document.getElementById(`${this.prefix}-auto-cashout-toggle').addEventListener('click', function() {
                    this.classList.toggle('active');
                    window[`panel_${prefix}`].isAutoCashout = this.classList.contains('active');
                });

                // የ Auto Cashout ቁጥር መቀየሪያ
                document.getElementById(`${this.prefix}-auto-cashout-val`).addEventListener('input', (e) => {
                    this.autoCashoutVal = parseFloat(e.target.value || 2.00);
                });
            }

            setAmount(value) {
                this.amount = value;
                this.input.value = this.amount.toFixed(2);
                if (this.betState === "NONE") {
                    this.btnText.innerText = this.amount.toFixed(2) + " ETB";
                }
            }

            // የፓነሉን ከለር እና ፅሁፍ እንደ ስቴቱ መቀያየሪያ
            updateButtonUI() {
                this.btnAction.className = "btn-action"; // reset
                
                if (this.betState === "NONE") {
                    this.btnAction.classList.add("btn-green");
                    this.btnLabel.innerText = "Bet";
                    this.btnText.innerText = this.amount.toFixed(2) + " ETB";
                } 
                else if (this.betState === "BETTING") {
                    this.btnAction.classList.add("btn-red");
                    this.btnLabel.innerText = "Cancel";
                    this.btnText.innerText = "Waiting...";
                } 
                else if (this.betState === "IN_GAME") {
                    this.btnAction.classList.add("btn-yellow");
                    this.btnLabel.innerText = "Cash Out";
                    // በየሚሊሰከንዱ የሚጨምረውን ጥቅም ለማሳየት
                    let currentWin = this.amount * gameState.multiplier;
                    this.btnText.innerText = currentWin.toFixed(2) + " ETB";
                }
                else if (this.betState === "CASHED_OUT") {
                    this.btnAction.classList.add("btn-green");
                    this.btnAction.style.opacity = "0.6";
                    this.btnLabel.innerText = "Cashed Out";
                    this.btnText.innerText = "Success";
                }
            }

            // ዋናው የሲስተም አክሽን
            async handleAction() {
                if (this.betState === "NONE") {
                    // 1. ውርርድ ማስገባት (Place Bet)
                    try {
                        const res = await fetch('/api/aviator/place_bet', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: userId, amount: this.amount })
                        });
                        const data = await res.json();
                        
                        if (data.status === "success") {
                            this.betState = "BETTING";
                            this.updateButtonUI();
                        } else {
                            alert(data.message);
                        }
                    } catch (e) {
                        alert("ከሰርቨር ጋር መገናኘት አልተቻለም!");
                    }
                } 
                else if (this.betState === "BETTING" && gameState.status === "WAITING") {
                    // ዙሩ ሳይጀምር በፊት ከተሰረዘ (ለመሰረዝ ባክኤንድ ኤፒአይ ካለህ እዚህ መጥራት ትችላለህ)
                    this.betState = "NONE";
                    this.updateButtonUI();
                }
                else if (this.betState === "IN_GAME") {
                    // 2. ብር ማውጣት (Cash Out)
                    this.triggerCashout();
                }
            }

            async triggerCashout() {
                if (this.betState !== "IN_GAME") return;
                
                try {
                    const res = await fetch('/api/aviator/cashout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    });
                    const data = await res.json();

                    if (data.status === "success") {
                        this.betState = "CASHED_OUT";
                        this.updateButtonUI();
                        // አዲስ ባላንስ ማሳየት ከፈለግክ እዚህ Header ላይ ማስተካከል ትችላለህ
                        document.querySelector(".balance").innerText = (parseFloat(document.querySelector(".balance").innerText) + data.win_amount).toFixed(2) + " ETB";
                    } else {
                        alert(data.message);
                    }
                } catch (e) {
                    console.error("Cashout error:", e);
                }
            }

            // ዙሩ ሲጀምር (FLYING ሲሆን)
            onRoundStart() {
                if (this.betState === "BETTING") {
                    this.betState = "IN_GAME";
                } else {
                    this.betState = "NONE";
                    // Auto Bet በርቶ ከሆነ በራሱ አዲስ ውርርድ እንዲያስገባ ማድረግ
                    if (this.isAutoBet && gameState.status === "WAITING") {
                        this.handleAction();
                    }
                }
                this.updateButtonUI();
            }

            // አውሮፕላኑ ሲበር በየሰከንዱ ፓነሉን ማደሻ (ለ Cash Out ቁጥር ማሳያ)
            onMultiplierTick() {
                if (this.betState === "IN_GAME") {
                    let currentWin = this.amount * gameState.multiplier;
                    this.btnText.innerText = currentWin.toFixed(2) + " ETB";

                    // Auto Cash Out ማረጋገጫ ሎጂክ
                    if (this.isAutoCashout && gameState.multiplier >= this.autoCashoutVal) {
                        this.triggerCashout();
                    }
                }
            }

            // አውሮፕላኑ ሲከሰከስ (CRASHED)
            onRoundCrash() {
                this.btnAction.style.opacity = "1";
                this.betState = "NONE";
                this.updateButtonUI();
                
                // Auto Bet በርቶ ከነበረ ለሚቀጥለው ዙር በራሱ እንዲመዘገብ
                if (this.isAutoBet) {
                    setTimeout(() => { this.handleAction(); }, 500);
                }
            }
        }

        // ሁለቱንም ፓነሎች ማስጀመር
        window.panel_p1 = new BetPanel('p1');
        window.panel_p2 = new BetPanel('p2');

        // ==========================================
        // 📡 3. የ Socket.IO ክስተቶች (Realtime Events)
        // ==========================================
        
        // ሀ. የጌሙን አጠቃላይ ሁኔታ ማዳመጫ (State Listener)
        socket.on('game_state', function(data) {
            gameState.status = data.status;
            const textElement = document.getElementById("multiplier-text");

            if (data.status === 'WAITING') {
                textElement.innerText = "WAITING...";
                textElement.style.color = "#ffffff";
                
                window.panel_p1.onRoundCrash();
                window.panel_p2.onRoundCrash();
            }
            
            if (data.status === 'FLYING') {
                window.panel_p1.onRoundStart();
                window.panel_p2.onRoundStart();
            }
            
            if (data.status === 'CRASHED') {
                textElement.innerText = "FLEW AWAY @ " + data.crash_point.toFixed(2) + "x";
                textElement.style.color = "#ff3333";
                
                // ታሪክ ባር ላይ መጨመር (History Tape)
                updateHistoryTape(data.crash_point);
            }
        });

        // ለ. ⚡ በየሚሊሰከንዱ የኦድ መጠን ማሳያ (Multiplier Tick)
        socket.on('multiplier_update', function(data) {
            gameState.multiplier = data.multiplier;
            
            const textElement = document.getElementById("multiplier-text");
            if (gameState.status === 'FLYING' && textElement) {
                textElement.innerText = data.multiplier.toFixed(2) + "x";
                textElement.style.color = "#ffffff";
            }

            // ሁለቱንም ፓነሎች ማደስ
            window.panel_p1.onMultiplierTick();
            window.panel_p2.onMultiplierTick();
        });

        // ሐ. የክራሽ ታሪክን በሪልታይም ማሳያ
        function updateHistoryTape(crashPoint) {
            const historyBar = document.querySelector(".history-bar");
            let colorClass = "hist-blue";
            if (crashPoint < 2.0) colorClass = "hist-red";
            else if (crashPoint >= 10.0) colorClass = "hist-purple";

            const newItem = document.createElement("span");
            newItem.className = `history-item ${colorClass}`;
            newItem.innerText = crashPoint.toFixed(2) + "x";

            // አዲሱን ታሪክ መጀመሪያ ላይ ማስገባት
            historyBar.insertBefore(newItem, historyBar.firstChild);
            
            // ከ 6 በላይ ከሆኑ የቆዩትን ማጥፋት
            if (historyBar.children.length > 8) {
                historyBar.removeChild(historyBar.lastChild);
            }
        }
    </script>
</body>
</html>
