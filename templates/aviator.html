<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aviator | YegnaBet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(180deg, #07111f, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 12px;
        }
        .card {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .title {
            font-size: 18px;
            font-weight: 800;
        }
        .sub {
            font-size: 12px;
            color: #94a3b8;
        }
        .balance {
            background: #0b3d6d;
            color: #fff;
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
        }
        .game-area {
            background: linear-gradient(180deg, #020617, #111827);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
        }
        .status {
            font-size: 12px;
            color: #f59e0b;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .multiplier {
            font-size: 44px;
            font-weight: 900;
            color: #facc15;
            margin: 8px 0;
        }
        .countdown {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 6px;
        }
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 12px;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-yellow { background: #f59e0b; color: #111827; }
        .btn-green { background: #22c55e; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-dark { background: #111827; color: white; border: 1px solid #334155; }
        .bet-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .stake-btn {
            background: #1f2937;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .input {
            width: 100%;
            border: 1px solid #334155;
            background: #111827;
            color: #fff;
            padding: 10px;
            border-radius: 10px;
            outline: none;
        }
        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .history-list, .bet-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            color: #cbd5e1;
        }
        .history-item, .bet-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px;
        }
        .small {
            font-size: 11px;
            color: #94a3b8;
        }
        .pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background: #1f2937;
            color: #cbd5e1;
            font-size: 11px;
            margin-left: 4px;
        }
        @media (max-width: 600px) {
            .bet-grid { grid-template-columns: repeat(2, 1fr); }
            .multiplier { font-size: 34px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="title">Aviator</div>
            <div class="sub">Crash game • real-time multiplier • instant cashout</div>
        </div>
        <div class="balance" id="balance">0.00 ETB</div>
    </div>

    <div class="card game-area">
        <div class="status" id="game-status">WAITING</div>
        <div class="countdown" id="countdown">Next round in 10s</div>
        <div class="multiplier" id="multiplier">1.00x</div>
        <div class="small" id="round-id">Round #0</div>
        <div class="controls">
            <button class="btn btn-yellow" id="place-bet-btn">Place Bet</button>
            <button class="btn btn-green" id="cashout-btn">Cash Out</button>
            <button class="btn btn-red" id="cancel-bet-btn">Cancel Bet</button>
        </div>
    </div>

    <div class="card">
        <div class="small" style="margin-bottom:8px;">Quick Stake</div>
        <div class="bet-grid">
            <button class="stake-btn" data-amount="10">10</button>
            <button class="stake-btn" data-amount="20">20</button>
            <button class="stake-btn" data-amount="50">50</button>
            <button class="stake-btn" data-amount="100">100</button>
        </div>

        <div class="row" style="margin-top:10px;">
            <input class="input" id="bet-amount" type="number" min="10" step="10" value="20" />
            <input class="input" id="auto-cashout" type="number" min="1" step="0.1" value="2.00" />
        </div>

        <div class="small" id="bet-message">Choose a stake and place your bet.</div>
    </div>

    <div class="card">
        <div style="font-weight:700; margin-bottom:8px;">Round History</div>
        <div class="history-list" id="history-list"></div>
    </div>

    <div class="card">
        <div style="font-weight:700; margin-bottom:8px;">Recent Player Activity</div>
        <div class="bet-list" id="activity-list"></div>
    </div>

    <script src="{{ url_for('static', filename='js/aviator.js') }}"></script>
</body>
</html>
