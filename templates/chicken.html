<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yegna Bet - Chicken Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --light-text: #ffffff;
            --success-color: #4e9f3d;
            --gold-color: #ffd700;
            --danger-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--light-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background-color: var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background-color: rgba(229, 11, 44, 0.15);
            border: 1px solid #e50b2c;
            color: #e50b2c;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:active { transform: scale(0.9); }

        .balance-box {
            background-color: rgba(78, 159, 61, 0.2);
            border: 1px solid var(--success-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #63e2b7;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 80px;
        }

        .welcome-msg {
            text-align: center;
            margin-top: 10px;
        }

        .welcome-msg h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 5px 0;
        }

        .welcome-msg p {
            color: #8a8a8a;
            margin: 0;
        }

        .game-controls {
            background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mines-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .mines-btn {
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .mines-btn.active {
            background-color: var(--gold-color);
            color: #1a1a2e;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .bet-input {
            background-color: var(--accent-color);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--gold-color);
            width: 100px;
            height: 45px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .start-btn, .cashout-btn {
            background: linear-gradient(135deg, var(--gold-color), #ffb300);
            border: none;
            color: #1a1a2e;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .start-btn:disabled, .cashout-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .tile {
            aspect-ratio: 1;
            background-color: var(--accent-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .tile:active { transform: scale(0.95); }
        .tile.revealed-chicken { background-color: var(--success-color); }
        .tile.revealed-bone { background-color: var(--danger-color); }
        .tile.disabled { opacity: 0.5; cursor: not-allowed; }

        .multiplier-display {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold-color);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">👤</div>
            <span id="user-name">User</span>
        </div>
        <div class="header-actions">
            <button onclick="handleLogout()" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
            </button>
            <div class="balance-box">
                <i class="fas fa-wallet"></i>
                <span id="user-balance">0.00</span> ETB
            </div>
        </div>
    </header>

    <div class="container">
        <div class="welcome-msg">
            <h1>🐔 Chicken Game</h1>
            <p>Find the chickens, avoid the bones!</p>
        </div>

        <div class="multiplier-display" id="multiplier-display">Multiplier: 1.00x</div>

        <div class="game-controls">
            <div class="mines-selector">
                <span>Mines:</span>
                <button class="mines-btn active" data-mines="1">1</button>
                <button class="mines-btn" data-mines="3">3</button>
                <button class="mines-btn" data-mines="5">5</button>
                <button class="mines-btn" data-mines="10">10</button>
            </div>
            <div class="input-group">
                <button class="btn-stepper" onclick="changeBet(-10)">-</button>
                <input type="number" class="bet-input" id="bet-amount" value="20" min="1">
                <button class="btn-stepper" onclick="changeBet(10)">+</button>
            </div>
            <button class="start-btn" id="start-btn" onclick="startGame()">Start Game</button>
            <button class="cashout-btn" id="cashout-btn" onclick="cashout()" style="display: none;">Cash Out</button>
        </div>

        <div class="grid-container" id="grid-container"></div>
    </div>

    <script>
        // --- AUTH INTEGRATION ---
        let currentUser = null;
        let userId = null;
        let userName = null;
        const storedUser = localStorage.getItem('currentUser');
        
        if (storedUser) {
            currentUser = JSON.parse(storedUser);
            userId = currentUser.id;
            userName = currentUser.username;
        } else {
            window.location.href = '/login';
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = '/login';
            }
        }
        // --- END AUTH INTEGRATION ---

        let gameActive = false;
        let selectedMines = 5;
        let currentMultiplier = 1.00;
        let currentBalance = 0;
        let revealedTiles = [];

        document.addEventListener("DOMContentLoaded", function() {
            if (document.getElementById("user-name")) {
                document.getElementById("user-name").innerText = userName || "User";
                if (userName && userName.length > 0) {
                    document.getElementById("user-avatar").innerText = userName.charAt(0).toUpperCase();
                }
            }
            initGrid();
            fetchBalance();

            document.querySelectorAll(".mines-btn").forEach(btn => {
                btn.addEventListener("click", function() {
                    if (gameActive) return;
                    document.querySelectorAll(".mines-btn").forEach(b => b.classList.remove("active"));
                    this.classList.add("active");
                    selectedMines = parseInt(this.dataset.mines);
                });
            });
        });

        async function fetchBalance() {
            try {
                const res = await fetch("/api/get_balance", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                if (data.status === "success") {
                    currentBalance = data.balance;
                    document.getElementById("user-balance").innerText = currentBalance.toFixed(2);
                }
            } catch (e) {
                console.error("Balance fetch error", e);
            }
        }

        function initGrid() {
            const container = document.getElementById("grid-container");
            container.innerHTML = "";
            for (let i = 0; i < 25; i++) {
                const tile = document.createElement("div");
                tile.className = "tile";
                tile.dataset.index = i;
                tile.innerText = "?";
                tile.addEventListener("click", () => revealTile(i));
                container.appendChild(tile);
            }
        }

        function changeBet(amount) {
            const betInput = document.getElementById("bet-amount");
            let current = parseInt(betInput.value) || 20;
            let newValue = current + amount;
            if (newValue < 1) newValue = 1;
            betInput.value = newValue;
        }

        async function startGame() {
            const betAmount = parseFloat(document.getElementById("bet-amount").value);
            if (betAmount <= 0 || betAmount > currentBalance) {
                alert("Invalid bet amount");
                return;
            }

            const btn = document.getElementById("start-btn");
            btn.disabled = true;

            try {
                const res = await fetch("/api/chicken/start", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_id: userId,
                        bet_amount: betAmount,
                        mines: selectedMines
                    })
                });
                const data = await res.json();
                if (data.status === "success") {
                    gameActive = true;
                    currentMultiplier = 1.00;
                    revealedTiles = [];
                    initGrid();
                    document.getElementById("multiplier-display").innerText = `Multiplier: ${currentMultiplier.toFixed(2)}x`;
                    document.getElementById("start-btn").style.display = "none";
                    document.getElementById("cashout-btn").style.display = "block";
                    document.getElementById("cashout-btn").disabled = true;
                    fetchBalance();
                } else {
                    alert(data.message);
                }
            } catch (e) {
                console.error("Start game error", e);
                alert("Failed to start game");
            } finally {
                btn.disabled = false;
            }
        }

        async function revealTile(index) {
            if (!gameActive || revealedTiles.includes(index)) return;

            try {
                const res = await fetch("/api/chicken/reveal", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId, tile: index })
                });
                const data = await res.json();
                
                const tile = document.querySelector(`.tile[data-index="${index}"]`);
                revealedTiles.push(index);

                if (data.status === "gameover") {
                    gameActive = false;
                    tile.classList.add("revealed-bone");
                    tile.innerText = "💀";
                    document.querySelectorAll(".tile").forEach(t => t.classList.add("disabled"));
                    document.getElementById("cashout-btn").style.display = "none";
                    document.getElementById("start-btn").style.display = "block";
                    alert(data.message);
                    fetchBalance();
                } else if (data.status === "safe") {
                    tile.classList.add("revealed-chicken");
                    tile.innerText = "🐔";
                    currentMultiplier = data.current_multiplier;
                    document.getElementById("multiplier-display").innerText = `Multiplier: ${currentMultiplier.toFixed(2)}x`;
                    document.getElementById("cashout-btn").disabled = false;
                }
            } catch (e) {
                console.error("Reveal tile error", e);
            }
        }

        async function cashout() {
            if (!gameActive) return;

            try {
                const res = await fetch("/api/chicken/cashout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                if (data.status === "success") {
                    gameActive = false;
                    alert(data.message);
                    document.getElementById("cashout-btn").style.display = "none";
                    document.getElementById("start-btn").style.display = "block";
                    fetchBalance();
                } else {
                    alert(data.message);
                }
            } catch (e) {
                console.error("Cashout error", e);
            }
        }
    </script>
</body>
</html>
