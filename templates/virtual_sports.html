<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yegna Bet - Virtual Sports</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --light-text: #ffffff;
            --success-color: #4e9f3d;
            --gold-color: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--light-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background-color: var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background-color: rgba(229, 11, 44, 0.15);
            border: 1px solid #e50b2c;
            color: #e50b2c;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:active { transform: scale(0.9); }

        .balance-box {
            background-color: rgba(78, 159, 61, 0.2);
            border: 1px solid var(--success-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #63e2b7;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 80px;
        }

        .welcome-msg {
            text-align: center;
            margin-top: 10px;
        }

        .welcome-msg h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 5px 0;
        }

        .welcome-msg p {
            color: #8a8a8a;
            margin: 0;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            font-weight: bold;
        }

        .odds-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .odd-btn {
            flex: 1;
            background-color: var(--accent-color);
            border: none;
            border-radius: 10px;
            padding: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .odd-btn:active {
            background-color: var(--text-color);
        }

        .bet-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bet-input {
            flex: 1;
            background-color: var(--accent-color);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--gold-color);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .place-bet-btn {
            background: linear-gradient(135deg, var(--gold-color), #ffb300);
            border: none;
            color: #1a1a2e;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .place-bet-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">👤</div>
            <span id="user-name">User</span>
        </div>
        <div class="header-actions">
            <button onclick="handleLogout()" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
            </button>
            <div class="balance-box">
                <i class="fas fa-wallet"></i>
                <span id="user-balance">0.00</span> ETB
            </div>
        </div>
    </header>

    <div class="container">
        <div class="welcome-msg">
            <h1>🎮 Virtual Sports</h1>
            <p>Place your bets on virtual matches!</p>
        </div>

        <div id="matches-container"></div>

        <div class="bet-controls" id="bet-controls" style="display: none;">
            <div class="input-group">
                <button class="btn-stepper" onclick="changeBet(-10)">-</button>
                <input type="number" class="bet-input" id="bet-amount" value="20" min="1">
                <button class="btn-stepper" onclick="changeBet(10)">+</button>
            </div>
            <button class="place-bet-btn" id="place-bet-btn" onclick="placeBet()">Place Bet</button>
        </div>
    </div>

    <script>
        // --- AUTH INTEGRATION ---
        let currentUser = null;
        let userId = null;
        let userName = null;
        const storedUser = localStorage.getItem('currentUser');
        
        if (storedUser) {
            currentUser = JSON.parse(storedUser);
            userId = currentUser.id;
            userName = currentUser.username;
        } else {
            window.location.href = '/login';
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = '/login';
            }
        }
        // --- END AUTH INTEGRATION ---

        let selectedMatch = null;
        let selectedBetOn = null;
        let currentBalance = 0;

        document.addEventListener("DOMContentLoaded", function() {
            if (document.getElementById("user-name")) {
                document.getElementById("user-name").innerText = userName || "User";
                if (userName && userName.length > 0) {
                    document.getElementById("user-avatar").innerText = userName.charAt(0).toUpperCase();
                }
            }
            fetchMatches();
            fetchBalance();
        });

        async function fetchBalance() {
            try {
                const res = await fetch("/api/get_balance", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                if (data.status === "success") {
                    currentBalance = data.balance;
                    document.getElementById("user-balance").innerText = currentBalance.toFixed(2);
                }
            } catch (e) {
                console.error("Balance fetch error", e);
            }
        }

        async function fetchMatches() {
            try {
                const res = await fetch("/api/virtual/matches");
                const data = await res.json();
                if (data.status === "success") {
                    renderMatches(data.matches);
                }
            } catch (e) {
                console.error("Matches fetch error", e);
            }
        }

        function renderMatches(matches) {
            const container = document.getElementById("matches-container");
            container.innerHTML = matches.map(match => `
                <div class="match-card">
                    <div class="match-teams">
                        <span>${match.home}</span>
                        <span>vs</span>
                        <span>${match.away}</span>
                    </div>
                    <div class="odds-buttons">
                        <button class="odd-btn" onclick="selectOdd('${match.match_id}', 'home_win', ${match.odds.home_win})">
                            Home<br>${match.odds.home_win.toFixed(2)}
                        </button>
                        <button class="odd-btn" onclick="selectOdd('${match.match_id}', 'draw', ${match.odds.draw})">
                            Draw<br>${match.odds.draw.toFixed(2)}
                        </button>
                        <button class="odd-btn" onclick="selectOdd('${match.match_id}', 'away_win', ${match.odds.away_win})">
                            Away<br>${match.odds.away_win.toFixed(2)}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function selectOdd(matchId, betOn, odd) {
            selectedMatch = matchId;
            selectedBetOn = betOn;
            document.getElementById("bet-controls").style.display = "flex";
        }

        function changeBet(amount) {
            const betInput = document.getElementById("bet-amount");
            let current = parseInt(betInput.value) || 20;
            let newValue = current + amount;
            if (newValue < 1) newValue = 1;
            betInput.value = newValue;
        }

        async function placeBet() {
            if (!selectedMatch || !selectedBetOn) return;
            const betAmount = parseFloat(document.getElementById("bet-amount").value);
            if (betAmount <= 0 || betAmount > currentBalance) {
                alert("Invalid bet amount");
                return;
            }

            const btn = document.getElementById("place-bet-btn");
            btn.disabled = true;

            try {
                const res = await fetch("/api/virtual/bet", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        user_id: userId,
                        match_id: selectedMatch,
                        bet_on: selectedBetOn,
                        bet_amount: betAmount
                    })
                });
                const data = await res.json();
                alert(data.status === "win" ? `🎉 You won! ${data.win_amount.toFixed(2)} ETB` : "😢 You lost!");
                fetchBalance();
                selectedMatch = null;
                selectedBetOn = null;
                document.getElementById("bet-controls").style.display = "none";
            } catch (e) {
                console.error("Bet error", e);
                alert("Bet failed");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
