<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሰፈር ጨዋታዎች - Virtual Betting Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Modern Betting Theme */
        body { 
            margin: 0; 
            padding: 0; 
            background: #0f172a; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: #fff; 
            overflow-x: hidden; 
        }

        /* Glassmorphism Header */
        .header-ui { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 3px solid #059669; 
            box-shadow: 0 4px 20px rgba(5, 150, 105, 0.25);
        }
        .user-info { font-size: 15px; font-weight: bold; }
        .balance-box { font-weight: 900; color: #10b981; font-size: 16px; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        .top-btn { 
            border: none; 
            padding: 8px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px; 
            transition: all 0.3s ease;
        }
        #wallet-btn { background: linear-gradient(135deg, #10b981, #059669); color: white; margin-left: 10px; }
        #history-btn { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; margin-left: 5px; }

        /* Grid */
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 20px; }
        
        .game-card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 16px; 
            padding: 18px; 
            text-align: center; 
            transition: all 0.3s ease;
        }
        .game-card:hover { transform: translateY(-5px); border-color: #10b981; }
        .game-card h3 { margin: 10px 0 5px 0; font-size: 17px; color: #f8fafc; }
        .game-card p { font-size: 13px; color: #94a3b8; margin-bottom: 15px; }
        .game-card button { 
            background: #10b981; 
            color: #fff; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
        }

        /* Betting Arena (Full Screen) */
        #horse-full-screen-game { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: #090d16; 
            z-index: 9999; 
            overflow-y: auto; 
            padding: 12px; 
            box-sizing: border-box; 
        }

        /* Betting Control Center */
        .betting-control {
            background: #111827; 
            padding: 18px; 
            border-radius: 16px; 
            border: 1px solid #1f2937; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Premium Horse Selector Row */
        .horse-bet-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .bet-card {
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 12px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bet-card.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
        }
        .bet-card .horse-num { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
        .bet-card .odds { font-size: 13px; color: #10b981; font-weight: 800; }

        /* Start Button */
        #race-start-main-btn {
            background: linear-gradient(135deg, #10b981, #047857);
            padding: 16px;
            font-size: 16px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            text-transform: uppercase;
        }
        #race-start-main-btn:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Modals */
        .modal { 
            position: fixed; 
            z-index: 10000; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.85); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .modal-content { 
            background-color: #1e293b; 
            color: white; 
            padding: 25px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
            border: 1px solid #334155; 
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }
        .close-btn { 
            position: absolute; 
            right: 15px; 
            top: 10px; 
            font-size: 28px; 
            font-weight: bold; 
            color: #94a3b8; 
            cursor: pointer; 
        }
        .close-btn:hover { color: #ef4444; }

        /* Input Styles inside Modals */
        .modal-content input, .modal-content select { 
            width: 90%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background-color: #0f172a; 
            color: white; 
            font-size: 14px; 
            outline: none; 
        }
        .modal-content input:focus { border-color: #10b981; }

        .info-box { 
            background-color: #0f172a; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 14px; 
            margin: 10px 0; 
            border-left: 4px solid #10b981; 
            text-align: left; 
        }
        .file-input-label { 
            display: block; 
            background-color: #0f172a; 
            padding: 10px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px dashed #10b981; 
            cursor: pointer; 
            font-size: 13px; 
        }
        .history-card { 
            background: #0f172a; 
            margin-bottom: 10px; 
            padding: 12px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            text-align: left; 
            border: 1px solid #334155; 
        }
    </style>
</head>
<body>

    <div class="header-ui">
        <div class="user-info">👋 <span id="user-name">ተጫዋች</span></div>
        <div style="display: flex; align-items: center;">
            <div class="balance-box">💰 <span id="user-balance">0.00</span> ብር</div>
            <button class="top-btn" id="wallet-btn" onclick="openWallet()">Wallet 💳</button>
            <button class="top-btn" id="history-btn" onclick="openHistory()">History 📜</button>
        </div>
    </div>

    <!-- Main Menu Grid -->
    <div class="games-grid" id="main-menu">
        <div class="game-card" style="grid-column: span 2;">
            <div style="font-size: 50px;">🏟️🏇</div>
            <h3>የፈረስ ውድድር (Virtual Betting)</h3>
            <p>በቀጥታ ስታዲየም ውስጥ የሚደረግ እውነተኛ ውድድር!</p>
            <button onclick="openHorseGame()">አሁኑኑ ይወራረዱ</button>
        </div>
    </div>

    <!-- 🏟️ HORSE GAME ARENA -->
    <div id="horse-full-screen-game">
        
        <!-- Arena Header -->
        <div style="display: flex; align-items: center; justify-content: space-between; background: #111827; padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #1f2937;">
            <button onclick="closeHorseGame()" style="background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer;">⬅️ ውጣ</button>
            <div style="font-weight: bold; color: #10b981; font-size: 15px;">💰 <span id="horse-game-balance">0.00</span> ብር</div>
            <button class="top-btn" style="background: #10b981; color: white;" onclick="openWallet()">Wallet 💳</button>
        </div>

        <!-- Real Canvas Track -->
        <div style="background: #020617; padding: 10px; border-radius: 16px; border: 2px solid #1e293b; text-align: center; margin-bottom: 12px;">
            <canvas id="raceCanvas" width="350" height="200" style="background: #14532d; border-radius: 10px; display: block; margin: 0 auto;"></canvas>
        </div>

        <!-- Betting Slip & Controls -->
        <div class="betting-control">
            <!-- Bet Amount Slider -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="font-size: 14px; font-weight: bold; color: #9ca3af;">የውርርድ መጠን፦</span>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button onclick="adjustHorseBet(-5)" style="background: #374151; color: white; border: none; width: 32px; height: 32px; border-radius: 6px; font-weight: bold;">-</button>
                    <input type="number" id="horse-bet-amount" value="10" style="width: 70px; text-align: center; background: #1f2937; border: 1px solid #374151; color: white; padding: 6px; font-size: 16px; font-weight: bold; border-radius: 6px;" readonly>
                    <button onclick="adjustHorseBet(5)" style="background: #374151; color: white; border: none; width: 32px; height: 32px; border-radius: 6px; font-weight: bold;">+</button>
                </div>
            </div>

            <div style="font-size: 13px; color: #9ca3af; margin-bottom: 8px; font-weight: bold;">ፈረስ ይምረጡ (Odds)፦</div>
            
            <!-- Three Horses Betting Selectors -->
            <div class="horse-bet-row">
                <div id="horse-card-1" class="bet-card" onclick="selectHorse(1)">
                    <div class="horse-num">🔴 ፈረስ 1</div>
                    <div class="odds">x 2.50</div>
                </div>
                <div id="horse-card-2" class="bet-card" onclick="selectHorse(2)">
                    <div class="horse-num">🔵 ፈረስ 2</div>
                    <div class="odds">x 1.85</div>
                </div>
                <div id="horse-card-3" class="bet-card" onclick="selectHorse(3)">
                    <div class="horse-num">🟢 ፈረስ 3</div>
                    <div class="odds">x 3.10</div>
                </div>
            </div>

            <button id="race-start-main-btn" onclick="startHorseRace()">🏁 ውርርድ አስይዝ (ውድድር ጀምር)</button>
        </div>
    </div>

    <!-- WALLET MODAL -->
    <div id="wallet-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('wallet-modal')">&times;</span>
            <h2>ዋሌት 💳</h2>
            <div style="background-color: #0f172a; padding: 12px; border-radius: 10px; font-size: 18px; margin-bottom: 15px; border: 1px solid #10b981;">
                ባላንስ: <span id="modal-balance" style="color:#10b981; font-weight:bold;">0.00</span> ብር
            </div>
            <hr style="border: 0; height: 1px; background: rgba(255, 255, 255, 0.1); margin: 15px 0;">
            
            <!-- Deposit -->
            <h3>ብር ያስገቡ (Deposit)</h3>
            <div class="info-box">
                እባክዎ መጀመሪያ በዚህ ቁጥር ይላኩ፦<br>
                ስልክ፦ <strong>0951381356</strong>
            </div>
            <input type="number" id="deposit-amount" placeholder="የላኩትን የብር መጠን እዚህ ይጻፉ...">
            <label class="file-input-label">
                🧾 የላኩበትን የደረሰኝ ፎቶ (Screenshot) ይምረጡ
                <input type="file" id="deposit-receipt" accept="image/*" style="display: none;" onchange="updateReceiptLabel(this)">
            </label>
            <span id="file-name-display" style="font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;"></span>
            <button id="deposit-submit-btn" style="background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer;" onclick="handleDeposit(event)">የክፍያ ማረጋገጫ ላክ</button>
            
            <hr style="border: 0; height: 1px; background: rgba(255, 255, 255, 0.1); margin: 20px 0;">
            
            <!-- Withdraw -->
            <h3 style="color: #ef4444;">ብር ያውጡ (Withdraw)</h3>
            <input type="text" id="withdraw-bank" placeholder="የባንክ አይነት (ምሳሌ: ንግድ ባንክ, ቴሌብር...)">
            <input type="text" id="withdraw-account-name" placeholder="የአካውንት ስም (ሙሉ ስም)...">
            <input type="text" id="withdraw-phone" placeholder="አካውንት ቁጥር / ስልክ ቁጥር...">
            <input type="number" id="withdraw-amount" placeholder="የሚወጣውን የብር መጠን ያስገቡ...">
            <button id="withdraw-submit-btn" style="background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer;" onclick="handleWithdraw(event)">ገንዘብ አውጣ</button>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="history-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('history-modal')">&times;</span>
            <h2>ታሪክ 📜 (History)</h2>
            <hr style="border: 0; height: 1px; background: rgba(255, 255, 255, 0.1); margin: 15px 0;">
            <div id="history-list-content"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if(tg) tg.expand();

        const initData = tg.initData || ""; 
        const userData = tg.initDataUnsafe?.user || { id: "8488592165", first_name: "የሰፈር ልጅ" };
        const userId = userData.id.toString();
        const firstName = userData.first_name; 
        let currentBalance = 0; 
        let selectedHorse = null;
        let isRacing = false;

        // Canvas Setup (Horizontal Stadium Track)
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        
        // 🏇 3 Horses on Horizontal Tracks
        const horses = [
            { id: 1, name: "ፈረስ 1", color: "#ef4444", emoji: "🏇", x: 20, y: 45, speedMultiplier: 1, odds: 2.50 },
            { id: 2, name: "ፈረስ 2", color: "#3b82f6", emoji: "🏇", x: 20, y: 100, speedMultiplier: 1.05, odds: 1.85 },
            { id: 3, name: "ፈረስ 3", color: "#10b981", emoji: "🏇", x: 20, y: 155, speedMultiplier: 0.95, odds: 3.10 }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("user-name").innerText = firstName;
            fetchBalance();
            setInterval(fetchBalance, 5000);
            drawStadium();
        });

        // Fetch user balance from DB
        async function fetchBalance() {
            try {
                const res = await fetch('/api/get_balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                if (data.status === "success") {
                    currentBalance = data.balance;
                    document.getElementById("user-balance").innerText = currentBalance.toFixed(2);
                    if(document.getElementById("modal-balance")) document.getElementById("modal-balance").innerText = currentBalance.toFixed(2);
                    if(document.getElementById("horse-game-balance")) document.getElementById("horse-game-balance").innerText = currentBalance.toFixed(2);
                }
            } catch (e) { console.error("ባላንስ ማግኘት አልተቻለም", e); }
        }

        // 🏟️ DRAW REAL HORIZONTAL STADIUM
        function drawStadium() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Dark Green Grass Field
            ctx.fillStyle = '#115e59'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Draw 3 Tracks (Lanes)
            const laneHeight = 50;
            const startY = 20;

            for (let i = 0; i < 3; i++) {
                let y = startY + (i * laneHeight);
                
                // Track asphalt background
                ctx.fillStyle = '#14532d';
                ctx.fillRect(0, y, canvas.width, laneHeight);

                // Top white boundary line
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();

                // Lane numbers
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.font = 'bold 30px sans-serif';
                ctx.fillText(i + 1, 30, y + 37);
            }

            // Bottom Lane Boundary line
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, startY + (3 * laneHeight));
            ctx.lineTo(canvas.width, startY + (3 * laneHeight));
            ctx.stroke();

            // 🏁 Red/White Checkerboard Finish Line at x = 310
            const finishX = 310;
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(finishX, startY);
            ctx.lineTo(finishX, startY + (3 * laneHeight));
            ctx.stroke();

            // Checkerboard details
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 15; i++) {
                if (i % 2 === 0) {
                    ctx.fillRect(finishX, startY + (i * 10), 4, 10);
                }
            }

            // 🏇 Render Horses
            horses.forEach(horse => {
                // Draw horse name tag
                ctx.fillStyle = horse.color;
                ctx.beginPath();
                ctx.arc(horse.x - 10, horse.y + 18, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(horse.id, horse.x - 10, horse.y + 18);

                // Draw Horse Emoji (Scaled to look bigger & clearer)
                ctx.save();
                ctx.font = '28px sans-serif';
                ctx.fillText(horse.emoji, horse.x, horse.y + 25);
                ctx.restore();
            });
        }

        function selectHorse(num) {
            if (isRacing) return;
            selectedHorse = num;
            
            // UI Highlight
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`horse-card-${i}`).classList.remove('selected');
            }
            document.getElementById(`horse-card-${num}`).classList.add('selected');
        }

        function adjustHorseBet(amount) {
            if (isRacing) return;
            const betInput = document.getElementById('horse-bet-amount');
            let val = parseInt(betInput.value || 10) + amount;
            if (val >= 5) betInput.value = val;
        }

        // 🏁 START HORIZONTAL RACE WITH LIVE ODDS
        function startHorseRace() {
            if (isRacing) return;
            if (!selectedHorse) return alert("እባክዎ መጀመሪያ የሚወራረዱበትን ፈረስ ይምረጡ!");
            
            const betAmount = parseInt(document.getElementById('horse-bet-amount').value);
            if (betAmount > currentBalance) return alert("ይቅርታ፣ ውርርድ ለማስያዝ በቂ ባላንስ የለዎትም!");

            isRacing = true;
            document.getElementById("race-start-main-btn").disabled = true;
            document.getElementById("race-start-main-btn").innerText = "🏇 ፈረሶቹ እየሮጡ ነው...";

            // Reset Horse positions
            horses.forEach(h => h.x = 20);

            let winner = null;
            const finishLine = 295;

            let interval = setInterval(() => {
                horses.forEach(horse => {
                    // Random acceleration for realistic natural running
                    let acceleration = Math.random() * 2.5 + 0.5;
                    horse.x += acceleration * horse.speedMultiplier;

                    if (horse.x >= finishLine && !winner) {
                        winner = horse;
                    }
                });

                drawStadium();

                if (winner) {
                    clearInterval(interval);
                    isRacing = false;
                    document.getElementById("race-start-main-btn").disabled = false;
                    document.getElementById("race-start-main-btn").innerText = "🏁 ውርርድ አስይዝ (ውድድር ጀምር)";

                    const winningOdds = winner.odds;
                    if (winner.id === selectedHorse) {
                        const winAmount = betAmount * winningOdds;
                        alert(`🎉 ድንቅ ነው! የመረጡት ፈረስ ቁጥር ${winner.id} በአንደኝነት አጠናቋል!\n\n💰 ያሸነፉት ብር፦ ${winAmount.toFixed(2)} ብር (x${winningOdds})`);
                    } else {
                        alert(`❌ ተሸንፈዋል! አሸናፊው ፈረስ ቁጥር ${winner.id} ነው።\nየመረጡት ፈረስ ${selectedHorse} ተሸንፏል።`);
                    }

                    fetchBalance(); // refresh DB Balance
                }
            }, 40);
        }

        function openHorseGame() {
            document.getElementById('horse-full-screen-game').style.display = 'block';
            horses.forEach(h => h.x = 20);
            setTimeout(drawStadium, 200);
        }

        function closeHorseGame() {
            if (isRacing) return alert("ውድድር ላይ እያሉ መውጣት አይቻልም!");
            document.getElementById('horse-full-screen-game').style.display = 'none';
        }

        function openWallet() { 
            document.getElementById("wallet-modal").style.display = "flex"; 
            document.getElementById("modal-balance").innerText = currentBalance.toFixed(2);
        }
        
        function openHistory() { 
            document.getElementById("history-modal").style.display = "flex"; 
            document.getElementById("history-list-content").innerHTML = "<i>እየጫነ ነው... ⏳</i>";
            loadHistory(); 
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        // Load Financial History
        async function loadHistory() {
            try {
                const res = await fetch('/api/get_history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                const list = document.getElementById("history-list-content");
                const financialHistory = (data.history || []).filter(h => h.type === 'ገቢ' || h.type === 'ወጪ');

                if(financialHistory.length === 0) {
                    list.innerHTML = "<p style='color:#aaa; text-align:center;'>ምንም ታሪክ የለዎትም!</p>";
                    return;
                }

                list.innerHTML = financialHistory.map(h => {
                    let statusBadge = '';
                    if(h.status === 'pending') statusBadge = '<span style="font-size: 18px; color: #ffeb3b;">⏳ Pending</span>';
                    else if(h.status === 'completed') statusBadge = '<span style="font-size: 18px; color: #4CAF50;">✅ Approved</span>';
                    else if(h.status === 'refund') statusBadge = '<span style="font-size: 18px; color: #f44336;">❌ Rejected</span>';

                    let borderColor = '#999';
                    let typeIcon = '';
                    if(h.type === 'ገቢ') { borderColor = '#10b981'; typeIcon = '📥 '; }
                    else if(h.type === 'ወጪ') { borderColor = '#ef4444'; typeIcon = '📤 '; }

                    return `
                    <div class="history-card" style="border-left: 4px solid ${borderColor};">
                        <div>
                            <div style="font-weight: bold; font-size: 14px; color: ${borderColor};">${typeIcon}${h.type}</div>
                            <div style="font-size: 16px; color: white; font-weight: bold; margin-top: 4px;">${h.amount} ብር</div>
                        </div>
                        <div>
                            ${statusBadge}
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (e) { 
                console.error("ታሪክ ማግኘት አልተቻለም", e); 
                document.getElementById("history-list-content").innerHTML = "<p style='color:#ef4444; text-align:center;'>ታሪክ መጫን አልተቻለም!</p>";
            }
        }

        function updateReceiptLabel(input) {
            const fileName = input.files[0] ? input.files[0].name : "";
            document.getElementById("file-name-display").innerText = "የተመረጠ ፋይል: " + fileName;
        }

        // Handle Deposit Request
        async function handleDeposit(event) {
            const amountInput = document.getElementById("deposit-amount");
            const receiptInput = document.getElementById("deposit-receipt");
            const amount = parseFloat(amountInput.value || 0);
            const receiptFile = receiptInput.files[0];

            if (amount <= 0) return alert("እባክዎ የላኩትን የብር መጠን ያስገቡ!");
            if (!receiptFile) return alert("እባክዎ የላኩበትን ደረሰኝ ያያይዙ!");

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "እየላከ ነው..."; 
            btn.disabled = true;

            const formData = new FormData();
            formData.append("user_id", userId);
            formData.append("user_name", firstName); 
            formData.append("amount", amount);
            formData.append("receipt", receiptFile);
            formData.append("init_data", initData);

            try {
                const res = await fetch('/api/deposit', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.status === "success") {
                    alert(`የማረጋገጫ ጥያቄዎ ተልኮአል ✅! አድሚኑ አይቶ ያጸድቀዋል።`);
                    amountInput.value = ""; receiptInput.value = "";
                    document.getElementById("file-name-display").innerText = "";
                    closeModal('wallet-modal');
                } else { alert(data.message || "ስህተት አጋጥሟል!"); }
            } catch (e) { alert("ከሰርቨር ጋር መገናኘት አልተቻለም!"); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }

        // Handle Withdraw Request
        async function handleWithdraw(event) {
            const amountInput = document.getElementById("withdraw-amount");
            const phoneInput = document.getElementById("withdraw-phone");
            const bankInput = document.getElementById("withdraw-bank");
            const accountNameInput = document.getElementById("withdraw-account-name");

            const amount = parseFloat(amountInput.value || 0);
            const phone = phoneInput.value.trim();
            const bankName = bankInput.value.trim();
            const accountName = accountNameInput.value.trim();

            if (!bankName) return alert("እባክዎ የባንክ አይነት ያስገቡ!");
            if (!accountName) return alert("እባክዎ የአካውንት ስም ያስገቡ!");
            if (!phone) return alert("እባክዎ አካውንት ቁጥር/ስልክ ያስገቡ!");
            if (amount <= 0) return alert("ማውጣት የሚፈልጉትን የብር መጠን ያስገቡ!");
            if (amount > currentBalance) return alert("ይቅርታ፣ በቂ ባላንስ የለዎትም!");

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "እየላከ ነው..."; btn.disabled = true;

            try {
                const res = await fetch('/api/withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId, user_name: firstName, amount: amount, phone: phone, bank_name: bankName, account_name: accountName })
                });
                const data = await res.json();
                if (data.status === "success") {
                    alert(`${amount} ብር በ ${bankName} ለማውጣት ጥያቄዎ ተልኮአል ✅!`);
                    amountInput.value = ""; phoneInput.value = ""; bankInput.value = ""; accountNameInput.value = "";
                    fetchBalance(); closeModal('wallet-modal');
                } else { alert(data.message || "ገንዘብ ማውጣት አልተቻለም!"); }
            } catch (e) { alert("ከሰርቨር ጋር መገናኘት አልተቻለም!"); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }
    </script>
</body>
