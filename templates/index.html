<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሰፈር ጨዋታዎች - Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Cyberpunk Dark Theme */
        body { 
            margin: 0; 
            padding: 0; 
            background: radial-gradient(circle at center, #180a2b 0%, #05020a 100%); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: #fff; 
            overflow-x: hidden; 
        }

        /* Glassmorphism Header */
        .header-ui { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: rgba(34, 17, 59, 0.6); 
            backdrop-filter: blur(10px); 
            border-bottom: 2px solid #ff007f; 
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.25);
        }
        .user-info { font-size: 15px; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .balance-box { font-weight: 900; color: #00f0ff; font-size: 16px; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }

        /* Premium Buttons */
        .top-btn { 
            border: none; 
            padding: 8px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #wallet-btn { 
            background: linear-gradient(135deg, #ff007f, #ff5f00); 
            color: white; 
            margin-left: 10px; 
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }
        #wallet-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 0, 127, 0.7); }

        #history-btn { 
            background: linear-gradient(135deg, #00f0ff, #0072ff); 
            color: white; 
            margin-left: 5px; 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        #history-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 240, 255, 0.7); }

        /* Grid */
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 20px; }
        
        /* Glassmorphism Cards */
        .game-card { 
            background: rgba(30, 15, 45, 0.55); 
            border: 1px solid rgba(255, 0, 127, 0.2); 
            border-radius: 16px; 
            padding: 18px; 
            text-align: center; 
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #ff007f;
            box-shadow: 0 10px 25px rgba(255, 0, 127, 0.2);
        }
        .game-card h3 { margin: 10px 0 5px 0; font-size: 17px; color: #ff007f; text-shadow: 0 0 5px rgba(255,0,127,0.3); }
        .game-card p { font-size: 13px; color: #00f0ff; margin-bottom: 15px; font-weight: bold; }
        
        .game-card button { 
            background: linear-gradient(135deg, #00ff87, #60efff); 
            color: #05020a; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            transition: all 0.3s; 
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
        }
        .game-card button:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0, 255, 135, 0.6); }

        /* Neon Coin Flip Setup */
        .coin-flip-box input { 
            width: 80%; 
            padding: 8px; 
            margin-bottom: 10px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid #ff007f; 
            color: white; 
            text-align: center; 
            border-radius: 6px; 
            outline: none; 
            font-weight: bold;
            box-shadow: inset 0 0 5px rgba(255,0,127,0.3);
        }
        .flip-btns { display: flex; gap: 8px; }

        /* Futuristic Fullscreen Horse Game Arena */
        #horse-full-screen-game { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: radial-gradient(circle at center, #100520 0%, #020105 100%); 
            z-index: 9999; 
            overflow-y: auto; 
            padding: 15px; 
            box-sizing: border-box; 
        }

        /* Neon Control Center */
        .control-center {
            background: rgba(26, 11, 46, 0.75); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid rgba(0, 240, 255, 0.3); 
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        /* Horse Buttons */
        .horse-select-btn {
            padding: 14px 5px; 
            font-size: 14px; 
            border-radius: 8px; 
            color: white; 
            border: 2px solid transparent; 
            font-weight: bold; 
            cursor: pointer;
            transition: all 0.3s;
        }
        .horse-select-btn:hover { transform: scale(1.05); }

        /* Modals (Neon Styled) */
        .modal { position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(5, 2, 10, 0.9); display: flex; justify-content: center; align-items: center; }
        .modal-content { 
            background-color: #12071f; 
            color: white; 
            padding: 25px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
            border: 2px solid #ff007f; 
            position: relative; 
            max-height: 85vh; 
            overflow-y: auto; 
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
        }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 28px; font-weight: bold; color: #ff007f; cursor: pointer; text-shadow: 0 0 8px #ff007f; }
        .close-btn:hover { color: #ff5f00; }

        h2 { color: #ff007f; margin-top: 10px; text-shadow: 0 0 10px rgba(255,0,127,0.5); }
        h3 { color: #00ff87; font-size: 16px; margin-bottom: 5px; text-shadow: 0 0 5px rgba(0,255,135,0.3); }
        .withdraw-title { color: #ff5f00; text-shadow: 0 0 10px rgba(255,95,0,0.5); }
        
        .modal-balance-box { background-color: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px; font-size: 18px; margin-bottom: 15px; border: 1px solid #00f0ff; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        .modal-balance-box span { color: #00f0ff; font-weight: bold; text-shadow: 0 0 8px rgba(0,240,255,0.5); }
        
        .info-box { background-color: rgba(26, 11, 46, 0.5); padding: 12px; border-radius: 8px; font-size: 14px; margin: 10px 0; border-left: 4px solid #00ff87; text-align: left; }
        hr { border: 0; height: 1px; background: rgba(255, 255, 255, 0.1); margin: 15px 0; }
        
        .modal-content input, .modal-content select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background-color: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; transition: 0.3s; }
        .modal-content input:focus { border-color: #ff007f; box-shadow: 0 0 10px rgba(255,0,127,0.3); }
        
        .file-input-label { display: block; background-color: rgba(0,0,0,0.3); padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px dashed #ff007f; cursor: pointer; font-size: 13px; }
        .btn-withdraw { background: linear-gradient(135deg, #ff5f00, #ff0055); box-shadow: 0 4px 15px rgba(255, 95, 0, 0.4); }
        .btn-withdraw:hover { box-shadow: 0 6px 20px rgba(255, 95, 0, 0.6); }

        .history-card { background: rgba(0,0,0,0.3); margin-bottom: 10px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; text-align: left; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="header-ui">
        <div class="user-info">👋 <span id="user-name">ተጫዋች</span></div>
        <div style="display: flex; align-items: center;">
            <div class="balance-box">💰 <span id="user-balance">0.00</span> ብር</div>
            <button class="top-btn" id="wallet-btn" onclick="openWallet()">Wallet 💳</button>
            <button class="top-btn" id="history-btn" onclick="openHistory()">History 📜</button>
        </div>
    </div>

    <div class="games-grid" id="main-menu">
        <div class="game-card">
            <div style="font-size: 44px; filter: drop-shadow(0 0 10px #ff007f);">🏇</div>
            <h3>Horse Race 🏇</h3>
            <p>መግቢያ፦ 2 ብር</p>
            <button onclick="openHorseGame()">ተጫወት</button>
        </div>

        <div class="game-card">
            <div style="font-size: 44px; filter: drop-shadow(0 0 10px #00f0ff);">🧀</div>
            <h3>የአይጧ ጨዋታ</h3>
            <p>መግቢያ፦ 5 ብር</p>
            <button onclick="launchGame('avit_game')">ተጫወት</button>
        </div>

        <div class="game-card">
            <div style="font-size: 44px; filter: drop-shadow(0 0 10px #00ff87);">🦁</div>
            <h3>የአንበሳ አደን</h3>
            <p>መግቢያ፦ 10 ብር</p>
            <button onclick="launchGame('anbessa_aden')">ተጫወት</button>
        </div>

        <div class="game-card">
            <div style="font-size: 44px; filter: drop-shadow(0 0 10px #ff5f00);">🪙</div>
            <h3>ዘውድና ጎፈር</h3>
            <div class="coin-flip-box">
                <input type="number" id="bet-amount" placeholder="የብር መጠን" min="1">
                <div class="flip-btns">
                    <button style="background: linear-gradient(135deg, #00f0ff, #0072ff); color: white;" onclick="triggerCoinFlip('ዘውድ')">ዘውድ</button>
                    <button style="background: linear-gradient(135deg, #00ff87, #00ab44); color: white;" onclick="triggerCoinFlip('ጎፈር')">ጎፈር</button>
                </div>
            </div>
        </div>
    </div>

    <!-- HORSE GAME ARENA -->
    <div id="horse-full-screen-game">
        
        <div style="display: flex; align-items: center; justify-content: space-between; background: rgba(34, 17, 59, 0.8); padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255, 0, 127, 0.3);">
            <button onclick="closeHorseGame()" style="background: linear-gradient(135deg, #ff0055, #a30036); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; width: auto; box-shadow: 0 0 10px rgba(255,0,85,0.4);">⬅️ ውጣ</button>
            <div style="font-weight: bold; color: #00f0ff; font-size: 15px; text-shadow: 0 0 8px #00f0ff;">💰 <span id="horse-game-balance">0.00</span> ብር</div>
            <div style="display: flex; gap: 5px;">
                <button class="top-btn" style="background-color: #ff007f; color: white;" onclick="openWallet()">Wallet 💳</button>
            </div>
        </div>

        <div style="background: rgba(14, 5, 28, 0.9); padding: 15px; border-radius: 20px; border: 1px solid #ff007f; text-align: center; margin-bottom: 15px; box-shadow: 0 0 25px rgba(255,0,127,0.15);">
            <canvas id="raceCanvas" width="340" height="340" style="background: #000; border-radius: 15px; display: block; margin: 0 auto; box-shadow: inset 0 0 30px rgba(255,0,127,0.3);"></canvas>
        </div>

        <div class="control-center">
            <h4 style="margin: 0 0 10px 0; color: #00f0ff; font-size: 14px; text-shadow: 0 0 5px rgba(0,240,255,0.3);">የውርርድ መጠን (ብር)</h4>
            <div style="display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px;">
                <button onclick="adjustHorseBet(-1)" style="width: 44px; height: 44px; background: linear-gradient(135deg, #ff0055, #ff00bf); font-size: 22px; border-radius: 50%; color: white; border: none; cursor: pointer; box-shadow: 0 0 10px rgba(255,0,85,0.4);">-</button>
                <input type="number" id="horse-bet-amount" value="2" min="1" style="width: 90px; text-align: center; background: rgba(0,0,0,0.5); border: 1px solid #00f0ff; color: white; padding: 10px; font-size: 20px; font-weight: bold; border-radius: 10px; box-shadow: inset 0 0 10px rgba(0,240,255,0.2);" readonly>
                <button onclick="adjustHorseBet(1)" style="width: 44px; height: 44px; background: linear-gradient(135deg, #00ff87, #60efff); font-size: 22px; border-radius: 50%; color: #05020a; border: none; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,135,0.4); font-weight: bold;">+</button>
            </div>

            <h4 style="margin: 0 0 10px 0; color: #ff007f; font-size: 14px; text-shadow: 0 0 5px rgba(255,0,127,0.3);">ፈረስዎን ይምረጡ</h4>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px;">
                <button id="h-btn-1" class="horse-select-btn" onclick="selectHorse(1)" style="background: rgba(231, 76, 60, 0.2); border: 2px solid #e74c3c; box-shadow: 0 0 8px rgba(231, 76, 60, 0.2);">🔴 ፈረስ 1</button>
                <button id="h-btn-2" class="horse-select-btn" onclick="selectHorse(2)" style="background: rgba(0, 229, 255, 0.15); border: 2px solid #00e5ff; color: #00e5ff; box-shadow: 0 0 8px rgba(0, 229, 255, 0.2);">🔵 ፈረስ 2</button>
                <button id="h-btn-3" class="horse-select-btn" onclick="selectHorse(3)" style="background: rgba(46, 204, 113, 0.2); border: 2px solid #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.2);">🟢 ፈረስ 3</button>
            </div>

            <button id="race-start-main-btn" onclick="startHorseRace()" style="background: linear-gradient(135deg, #ff007f, #ff5f00); padding: 16px; font-size: 17px; border-radius: 12px; color: white; font-weight: bold; border: none; cursor: pointer; width: 100%; box-shadow: 0 0 20px rgba(255,0,127,0.4); text-transform: uppercase; letter-spacing: 1px;">🏁 ውድድሩን ጀምር!</button>
        </div>
    </div>

    <div id="game-canvas-container">
        <button id="back-btn" onclick="exitGame()">ተመለስ ↩</button>
    </div>

    <!-- WALLET MODAL -->
    <div id="wallet-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('wallet-modal')">&times;</span>
            <h2>ዋሌት 💳</h2>
            <div class="modal-balance-box">ባላንስ: <span id="modal-balance">0.00</span> ብር</div>
            <hr>
            <h3>ብር ያስገቡ (Deposit)</h3>
            <div class="info-box">
                እባክዎ መጀመሪያ በዚህ ቁጥር ይላኩ፦<br>
                ስልክ፦ <strong>0951381356</strong>
            </div>
            <input type="number" id="deposit-amount" placeholder="የላኩትን የብር መጠን እዚህ ይጻፉ...">
            <label class="file-input-label">
                🧾 የላኩበትን የደረሰኝ ፎቶ (Screenshot) ይምረጡ
                <input type="file" id="deposit-receipt" accept="image/*" style="display: none;" onchange="updateReceiptLabel(this)">
            </label>
            <span id="file-name-display" style="font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;"></span>
            <button id="deposit-submit-btn" style="background: linear-gradient(135deg, #00ff87, #00ab44); color: white;" onclick="handleDeposit(event)">የክፍያ ማረጋገጫ ላክ</button>
            <hr>
            
            <h3 class="withdraw-title">ብር ያውጡ (Withdraw)</h3>
            <input type="text" id="withdraw-bank" placeholder="የባንክ አይነት (ምሳሌ: ንግድ ባንክ, ቴሌብር...)">
            <input type="text" id="withdraw-account-name" placeholder="የአካውንት ስም (ሙሉ ስም)...">
            <input type="text" id="withdraw-phone" placeholder="አካውንት ቁጥር / ስልክ ቁጥር...">
            <input type="number" id="withdraw-amount" placeholder="የሚወጣውን የብር መጠን ያስገቡ...">
            <button class="btn-withdraw" id="withdraw-submit-btn" onclick="handleWithdraw(event)">ገንዘብ አውጣ</button>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="history-modal" class="modal" style="display: none;">
        <div class="modal-content" style="border-color: #00f0ff; box-shadow: 0 0 25px rgba(0,240,255,0.3);">
            <span class="close-btn" onclick="closeModal('history-modal')">&times;</span>
            <h2 style="color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.5);">ታሪክ 📜 (History)</h2>
            <hr>
            <div id="history-list-content"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if(tg) tg.expand();

        const initData = tg.initData || ""; 
        const userData = tg.initDataUnsafe?.user || { id: "8488592165", first_name: "የሰፈር ልጅ" };
        const userId = userData.id.toString();
        const firstName = userData.first_name; 
        let currentBalance = 0;
        let selectedHorse = null;
        let isRacing = false;

        // Canvas Setup
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // 🏇 3 Premium Horses radii
        const horseConfig = [
            { id: 1, color: '#e74c3c', name: 'ፈረስ 1', radius: 55, glow: '#ff3333' },
            { id: 2, color: '#00e5ff', name: 'ፈረስ 2', radius: 95, glow: '#00ffff' },
            { id: 3, color: '#2ecc71', name: 'ፈረስ 3', radius: 135, glow: '#33ff33' }
        ];
        
        let horseAngles = [0, 0, 0];

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("user-name").innerText = firstName;
            fetchBalance();
            setInterval(fetchBalance, 5000);
            resetHorseAngles();
            drawTrack();
        });

        function resetHorseAngles() {
            horseAngles = [Math.PI / 2, Math.PI / 2, Math.PI / 2];
        }

        // 🎨 NEON PREMIUM DRAW TRACK FUNCTION
        function drawTrack() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Futuristic Dark Center Grass
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 35, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0214';
            ctx.fill();
            ctx.strokeStyle = '#ff007f';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff007f';
            ctx.stroke();
            ctx.restore();

            // 2. Draw Premium Tracks
            horseConfig.forEach(horse => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, horse.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#12071f';
                ctx.lineWidth = 26; 
                ctx.stroke();
                
                // Outer Track Border
                ctx.beginPath();
                ctx.arc(centerX, centerY, horse.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 0, 127, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Cyberpunk dashed line (Neon style)
                ctx.beginPath();
                ctx.arc(centerX, centerY, horse.radius, 0, Math.PI * 2);
                ctx.strokeStyle = horse.glow;
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 8]);
                ctx.shadowBlur = 12;
                ctx.shadowColor = horse.glow;
                ctx.stroke();
                ctx.restore();
            });

            // 3. Neon 🏁 Start/Finish Line
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(centerX, centerY + 35);
            ctx.lineTo(centerX, centerY + 150);
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f0ff';
            ctx.stroke();
            ctx.restore();

            // 4. Render Neon Horse Avatars
            horseConfig.forEach((horse, index) => {
                const angle = horseAngles[index]; 
                const x = centerX + horse.radius * Math.cos(angle);
                const y = centerY + horse.radius * Math.sin(angle);

                // Neon Aura/Backing
                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                ctx.strokeStyle = horse.color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 18;
                ctx.shadowColor = horse.glow;
                ctx.stroke();
                ctx.restore();

                // Horse number on track
                ctx.save();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 13px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(horse.id, x, y - 19);
                ctx.restore();

                // 🏇 Emoji translation & rotate
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI / 2); 
                ctx.font = '24px sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.scale(-1, 1); 
                ctx.fillText('🏇', 0, 0);
                ctx.restore();
            });
        }

        // 🏇 The Racing Loop
        function startHorseRace() {
            if (isRacing) return;
            const betAmount = parseInt(document.getElementById('horse-bet-amount').value);
            if (!selectedHorse) return alert("እባክዎ መጀመሪያ ፈረስ ይምረጡ!");
            if (betAmount > currentBalance) return alert("ይቅርታ፣ በቂ ባላንስ የለዎትም!");
            
            isRacing = true;
            document.getElementById("race-start-main-btn").disabled = true;
            document.getElementById("race-start-main-btn").innerText = "🏇 ውድድር ላይ ነው...";

            resetHorseAngles();
            let laps = [0, 0, 0]; 
            let winner = null;

            let interval = setInterval(() => {
                for(let i=0; i<3; i++) {
                    let speed = (Math.random() * 0.05) + 0.02;
                    let oldAngle = horseAngles[i];
                    
                    horseAngles[i] += speed;

                    if (oldAngle <= (Math.PI / 2 + Math.PI * 2) && horseAngles[i] >= (Math.PI / 2 + Math.PI * 2)) {
                        laps[i] = 1;
                        if (!winner) {
                            winner = i + 1;
                        }
                    }
                }

                drawTrack();

                if(laps.every(l => l === 1)) {
                    clearInterval(interval);
                    isRacing = false;
                    document.getElementById("race-start-main-btn").disabled = false;
                    document.getElementById("race-start-main-btn").innerText = "🏇 ውድድሩን ጀምር!";
                    
                    if (winner === selectedHorse) {
                        alert(`🎉 እንኳን ደስ አለዎት! የመረጡት ፈረስ ቁጥር ${winner} በአንደኝነት አጠናቋል! አሸንፈዋል!`);
                    } else {
                        alert(`❌ ተሸንፈሃል! ፈረስ ቁጥር ${winner} ቀድሞ አጠናቋል። የእርስዎ ፈረስ ቁጥር ${selectedHorse} ተሸንፏል።`);
                    }
                    resetHorseAngles();
                    drawTrack();
                }
            }, 50);
        }

        async function fetchBalance() {
            try {
                const res = await fetch('/api/get_balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                if (data.status === "success") {
                    currentBalance = data.balance;
                    document.getElementById("user-balance").innerText = currentBalance.toFixed(2);
                    if(document.getElementById("modal-balance")) document.getElementById("modal-balance").innerText = currentBalance.toFixed(2);
                    if(document.getElementById("horse-game-balance")) document.getElementById("horse-game-balance").innerText = currentBalance.toFixed(2);
                }
            } catch (e) { console.error("ባላንስ ማግኘት አልተቻለም", e); }
        }

        function openHorseGame() { 
            document.getElementById('horse-full-screen-game').style.display = 'block'; 
            fetchBalance(); 
            resetHorseAngles();
            setTimeout(drawTrack, 200); 
        }
        
        function closeHorseGame() { 
            if(isRacing) return alert("ውድድር እየተካሄደ መውጣት አይቻልም!");
            document.getElementById('horse-full-screen-game').style.display = 'none'; 
        }
        
        function adjustHorseBet(amount) { 
            const betInput = document.getElementById('horse-bet-amount'); 
            let val = parseInt(betInput.value || 2) + amount; 
            if(val >= 1) betInput.value = val; 
        }
        
        function selectHorse(num) { 
            if(isRacing) return; 
            selectedHorse = num; 
            for (let i = 1; i <= 3; i++) { 
                document.getElementById(`h-btn-${i}`).style.boxShadow = "none"; 
                document.getElementById(`h-btn-${i}`).style.borderColor = "transparent"; 
            } 
            // Highlight selected
            const activeBtn = document.getElementById(`h-btn-${num}`);
            if (num === 1) { activeBtn.style.borderColor = "#e74c3c"; activeBtn.style.boxShadow = "0 0 15px #e74c3c"; }
            if (num === 2) { activeBtn.style.borderColor = "#00e5ff"; activeBtn.style.boxShadow = "0 0 15px #00e5ff"; }
            if (num === 3) { activeBtn.style.borderColor = "#2ecc71"; activeBtn.style.boxShadow = "0 0 15px #2ecc71"; }
        }
        
        function openWallet() { 
            document.getElementById("wallet-modal").style.display = "flex"; 
            document.getElementById("modal-balance").innerText = currentBalance.toFixed(2);
        }
        
        function openHistory() { 
            document.getElementById("history-modal").style.display = "flex"; 
            document.getElementById("history-list-content").innerHTML = "<i>እየጫነ ነው... ⏳</i>";
            loadHistory(); 
        }
        
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function exitGame() { document.getElementById('main-menu').style.display = 'grid'; document.getElementById('game-canvas-container').style.display = 'none'; fetchBalance(); }

        async function loadHistory() {
            try {
                const res = await fetch('/api/get_history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                const list = document.getElementById("history-list-content");
                const financialHistory = (data.history || []).filter(h => h.type === 'ገቢ' || h.type === 'ወጪ');

                if(financialHistory.length === 0) {
                    list.innerHTML = "<p style='color:#aaa;'>ምንም ታሪክ የለዎትም!</p>";
                    return;
                }

                list.innerHTML = financialHistory.map(h => {
                    let statusBadge = '';
                    if(h.status === 'pending') statusBadge = '<span style="font-size: 18px; color: #ffeb3b;">⏳</span>';
                    else if(h.status === 'completed') statusBadge = '<span style="font-size: 18px; color: #4CAF50;">✅</span>';
                    else if(h.status === 'refund') statusBadge = '<span style="font-size: 18px; color: #f44336;">❌</span>';

                    let borderColor = '#999';
                    let typeIcon = '';
                    if(h.type === 'ገቢ') { borderColor = '#00ff87'; typeIcon = '📥 '; }
                    else if(h.type === 'ወጪ') { borderColor = '#ff007f'; typeIcon = '📤 '; }

                    return `
                    <div class="history-card" style="border-left: 4px solid ${borderColor};">
                        <div>
                            <div style="font-weight: bold; font-size: 14px; color: ${borderColor};">${typeIcon}${h.type}</div>
                            <div style="font-size: 16px; color: white; font-weight: bold; margin-top: 4px;">${h.amount} ብር</div>
                        </div>
                        <div style="display: flex; align-items: center; justify-content: center; width: 30px; height: 30px;">
                            ${statusBadge}
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (e) { console.error("ታሪክ ማግኘት አልተቻለም", e); }
        }

        function updateReceiptLabel(input) {
            const fileName = input.files[0] ? input.files[0].name : "";
            document.getElementById("file-name-display").innerText = "የተመረጠ ፋይል: " + fileName;
        }

        async function handleDeposit(event) {
            const amountInput = document.getElementById("deposit-amount");
            const receiptInput = document.getElementById("deposit-receipt");
            const amount = parseFloat(amountInput.value || 0);
            const receiptFile = receiptInput.files[0];

            if (amount <= 0) return alert("እባክዎ የላኩትን የብር መጠን ያስገቡ!");
            if (!receiptFile) return alert("እባክዎ የላኩበትን ደረሰኝ ያያይዙ!");

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "እየላከ ነው..."; 
            btn.disabled = true;

            const formData = new FormData();
            formData.append("user_id", userId);
            formData.append("user_name", firstName); 
            formData.append("amount", amount);
            formData.append("receipt", receiptFile);
            formData.append("init_data", initData);

            try {
                const res = await fetch('/api/deposit', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.status === "success") {
                    alert(`የማረጋገጫ ጥያቄዎ ተልኮአል ✅! አድሚኑ አይቶ ያጸድቀዋል።`);
                    amountInput.value = ""; receiptInput.value = "";
                    document.getElementById("file-name-display").innerText = "";
                    closeModal('wallet-modal');
                } else { alert(data.message || "ስህተት አጋጥሟል!"); }
            } catch (e) { alert("ከሰርቨር ጋር መገናኘት አልተቻለም!"); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }

        async function handleWithdraw(event) {
            const amountInput = document.getElementById("withdraw-amount");
            const phoneInput = document.getElementById("withdraw-phone");
            const bankInput = document.getElementById("withdraw-bank");
            const accountNameInput = document.getElementById("withdraw-account-name");

            const amount = parseFloat(amountInput.value || 0);
            const phone = phoneInput.value.trim();
            const bankName = bankInput.value.trim();
            const accountName = accountNameInput.value.trim();

            if (!bankName) return alert("እባክዎ የባንክ አይነት ያስገቡ!");
            if (!accountName) return alert("እባክዎ የአካውንት ስም ያስገቡ!");
            if (!phone) return alert("እባክዎ አካውንት ቁጥር/ስልክ ያስገቡ!");
            if (amount <= 0) return alert("ማውጣት የሚፈልጉትን የብር መጠን ያስገቡ!");
            if (amount > currentBalance) return alert("ይቅርታ፣ በቂ ባላንስ የለዎትም!");

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "እየላከ ነው..."; btn.disabled = true;

            try {
                const res = await fetch('/api/withdraw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId, user_name: firstName, amount: amount, phone: phone, bank_name: bankName, account_name: accountName })
                });
                const data = await res.json();
                if (data.status === "success") {
                    alert(`${amount} ብር በ ${bankName} ለማውጣት ጥያቄዎ ተልኮአል ✅!`);
                    amountInput.value = ""; phoneInput.value = ""; bankInput.value = ""; accountNameInput.value = "";
                    fetchBalance(); closeModal('wallet-modal');
                } else { alert(data.message || "ገንዘብ ማውጣት አልተቻለም!"); }
            } catch (e) { alert("ከሰርቨር ጋር መገናኘት አልተቻለም!"); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }

        async function launchGame(gameType) {
            try {
                const res = await fetch('/api/start_game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId, game_type: gameType })
                });
                const data = await res.json();
                if (data.status === "success" || data.status === "ok") {
                    document.getElementById('main-menu').style.display = 'none';
                    document.getElementById('game-canvas-container').style.display = 'block';
                    fetchBalance(); 
                } else { alert(data.message || "በቂ ባላንስ የለዎትም!"); }
            } catch (e) { alert("ከሰርቨር ጋር መገናኘት አልተቻለም!"); }
        }

        async function triggerCoinFlip(choice) {
            const betInput = document.getElementById("bet-amount");
            const betAmount = parseFloat(betInput.value || 0);
            if (betAmount <= 0) return alert("እባክዎ መጀመሪያ ትክክለኛ የውርርድ መጠን ያስገቡ!");
            if (betAmount > currentBalance) return alert("በቂ ባላንስ የለዎትም!");

            try {
                const res = await fetch('/api/coin_flip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': initData },
                    body: JSON.stringify({ user_id: userId, bet_amount: betAmount, choice: choice })
                });
                const data = await res.json();
                if (data.status === "win" || data.status === "lose") {
                    alert(data.message); betInput.value = ""; fetchBalance(); 
                } else { alert(data.message || "ስህተት አጋጥሟል!"); }
            } catch (e) { alert("ከሰርቨር ጋር መገናኘት አልተቻለም!"); }
        }
    </script>
    <script src="/static/js/game.js"></script>
