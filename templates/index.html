<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የሰፈር ጨዋታዎች - ዋና ማውጫ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --light-text: #ffffff;
            --success-color: #4e9f3d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--light-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Header Style */
        .header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background-color: var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .balance-box {
            background-color: rgba(78, 159, 61, 0.2);
            border: 1px solid var(--success-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #63e2b7;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 80px;
        }

        .welcome-msg {
            text-align: center;
            margin-top: 10px;
        }

        .welcome-msg h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 5px 0;
        }

        .welcome-msg p {
            color: #8a8a8a;
            margin: 0;
        }

        /* Game Cards List */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .game-card:active {
            transform: scale(0.98);
            border-color: var(--text-color);
        }

        .game-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-color), var(--text-color));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .game-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .game-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #aaaaaa;
        }

        .play-arrow {
            color: var(--text-color);
            font-size: 1.2rem;
        }

        /* Quick Action Buttons (Deposit/Withdraw) */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 12px;
            border-radius: 12px;
            color: var(--light-text);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        .action-btn:active {
            background-color: var(--accent-color);
        }

        /* Modals style */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-content h3 {
            margin: 0;
            color: var(--text-color);
        }

        .modal-content input, .modal-content select {
            background-color: var(--bg-color);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            color: var(--light-text);
            font-size: 1rem;
            outline: none;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .modal-btn {
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-submit {
            background-color: var(--success-color);
            color: white;
        }

        .btn-close {
            background-color: #555;
            color: white;
        }

        /* History List Style */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        /* Footer Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-top: 2px solid var(--accent-color);
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 10px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .nav-item.active {
            color: var(--text-color);
        }

        .nav-item i {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <!-- Upper Header -->
    <div class="header">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">U</div>
            <span id="user-name">የሰፈር ልጅ</span>
        </div>
        <div class="balance-box">
            <i class="fas fa-wallet"></i>
            <span id="user-balance">0.00</span> ብር
        </div>
    </div>

    <!-- Main Container -->
    <div class="container" id="main-view">
        
        <div class="welcome-msg">
            <h1>ሰላም፣ <span id="welcome-name">ተጫዋች</span>!</h1>
            <p>የሚወዱትን ጨዋታ ይምረጡና ዕድልዎን ይሞክሩ።</p>
        </div>

        <!-- Quick Actions -->
        <div class="actions-grid">
            <button class="action-btn" onclick="openDepositModal()">
                <i class="fas fa-arrow-down" style="color: #4e9f3d;"></i> ብር አስገባ
            </button>
            <button class="action-btn" onclick="openWithdrawModal()">
                <i class="fas fa-arrow-up" style="color: #e94560;"></i> ብር አውጣ
            </button>
        </div>

        <h2>🎮 ጨዋታዎች</h2>
        
        <!-- Game List Links -->
        <div class="games-list">
            <a href="/coin_flip_game" class="game-card">
                <div class="game-details">
                    <div class="game-icon">🪙</div>
                    <div class="game-info">
                        <h3>እጥፍ ወይስ ባዶ (ዘውድና ጎፈር)</h3>
                        <p>ዘውድ ወይስ ጎፈር? የመረጡት ከመጣ ባላንስዎን እጥፍ ያድርጉ!</p>
                    </div>
                </div>
                <div class="play-arrow"><i class="fas fa-chevron-right"></i></div>
            </a>
        </div>
    </div>

    <!-- History View Container -->
    <div class="container" id="history-view" style="display: none;">
        <h2>📜 የጨዋታና የሂሳብ ታሪክ</h2>
        <div class="history-list" id="history-container">
            <p style="text-align: center; color: #8a8a8a;">ምንም ታሪክ የለም።</p>
        </div>
    </div>

    <!-- Deposit Modal -->
    <div class="modal" id="depositModal">
        <div class="modal-content">
            <h3>💳 ብር ማስገቢያ (Deposit)</h3>
            <p style="font-size: 0.85rem; color: #ccc; margin: 0;">የባንክ ደረሰኝ (Screenshot) እዚህ ይስቀሉ</p>
            <input type="number" id="dep-amount" placeholder="የብር መጠን (ምሳሌ፡ 100)" min="1">
            <input type="file" id="dep-receipt" accept="image/*">
            <div class="modal-buttons">
                <button class="modal-btn btn-submit" onclick="submitDeposit()">ላክ</button>
                <button class="modal-btn btn-close" onclick="closeModal('depositModal')">ዝጋ</button>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div class="modal" id="withdrawModal">
        <div class="modal-content">
            <h3>💸 ብር ማውጫ (Withdraw)</h3>
            <input type="text" id="wit-bank" placeholder="የባንክ ስም (ምሳሌ፡ ንግድ ባንክ)">
            <input type="text" id="wit-acc-name" placeholder="የአካውንት ባለቤት ስም">
            <input type="text" id="wit-phone" placeholder="የሂሳብ ቁጥር ወይም ስልክ">
            <input type="number" id="wit-amount" placeholder="የብር መጠን">
            <div class="modal-buttons">
                <button class="modal-btn btn-submit" onclick="submitWithdraw()">ጠይቅ</button>
                <button class="modal-btn btn-close" onclick="closeModal('withdrawModal')">ዝጋ</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-games" onclick="switchTab('games')">
            <i class="fas fa-gamepad"></i>
            <span>ጨዋታዎች</span>
        </div>
        <div class="nav-item" id="nav-history" onclick="switchTab('history')">
            <i class="fas fa-history"></i>
            <span>ታሪክ</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userId = 123456789;
        let userName = "የሰፈር ልጅ";

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
            userName = tg.initDataUnsafe.user.first_name || "የሰፈር ልጅ";
            
            document.getElementById('user-name').innerText = userName;
            document.getElementById('welcome-name').innerText = userName;
            // ስሙ ነጥብ ወይም ባዶ ከሆነ እንዳይበላሽ መከላከያ
            const avatarChar = userName.trim() ? userName.trim().charAt(0).toUpperCase() : "U";
            document.getElementById('user-avatar').innerText = avatarChar;
        }

        function loadBalance() {
            fetch('/api/get_balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('user-balance').innerText = parseFloat(data.balance).toFixed(2);
                }
            })
            .catch(err => console.error("Error loading balance:", err));
        }

        // Tab Switcher (ጨዋታዎች VS ታሪክ)
        function switchTab(tab) {
            if (tab === 'games') {
                document.getElementById('main-view').style.display = 'flex';
                document.getElementById('history-view').style.display = 'none';
                document.getElementById('nav-games').classList.add('active');
                document.getElementById('nav-history').classList.remove('active');
            } else {
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('history-view').style.display = 'flex';
                document.getElementById('nav-games').classList.remove('active');
                document.getElementById('nav-history').classList.add('active');
                loadHistory();
            }
        }

        // Modals Management
        function openDepositModal() { document.getElementById('depositModal').style.display = 'flex'; }
        function openWithdrawModal() { document.getElementById('withdrawModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // Submit Deposit
        function submitDeposit() {
            const amount = parseFloat(document.getElementById('dep-amount').value);
            const receiptInput = document.getElementById('dep-receipt');
            
            if (isNaN(amount) || amount <= 0 || !receiptInput.files[0]) {
                tg.showAlert("እባክዎ መጠን እና ደረሰኝ በትክክል ያስገቡ!");
                return;
            }

            const formData = new FormData();
            formData.append('user_id', userId);
            formData.append('user_name', userName);
            formData.append('amount', amount);
            formData.append('receipt', receiptInput.files[0]);

            fetch('/api/deposit', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    tg.showAlert("የማስገቢያ ጥያቄዎ ለአድሚን ተልኳል! በቅርቡ ይጸድቃል።");
                    closeModal('depositModal');
                } else {
                    tg.showAlert("ስህተት ተፈጥሯል፣ እባክዎ እንደገና ይሞክሩ።");
                }
            })
            .catch(err => tg.showAlert("ሰርቨር ማግኘት አልተቻለም!"));
        }

        // Submit Withdraw
        function submitWithdraw() {
            const bank = document.getElementById('wit-bank').value;
            const accName = document.getElementById('wit-acc-name').value;
            const phone = document.getElementById('wit-phone').value;
            const amount = parseFloat(document.getElementById('wit-amount').value);

            if (!bank || !accName || !phone || isNaN(amount) || amount <= 0) {
                tg.showAlert("እባክዎ ሁሉንም መረጃዎች በትክክል ያስገቡ!");
                return;
            }

            fetch('/api/withdraw', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: userId,
                    user_name: userName,
                    amount: amount,
                    phone: phone,
                    bank_name: bank,
                    account_name: accName
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    tg.showAlert("የወጪ ጥያቄዎ ለአድሚን ቀርቧል!");
                    closeModal('withdrawModal');
                } else {
                    tg.showAlert(data.message || "ስህተት ተፈጥሯል!");
                }
            })
            .catch(err => tg.showAlert("የግንኙነት ስህተት!"));
        }

        // Load History
        function loadHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = '<p style="text-align: center; color: #8a8a8a;">በመጫን ላይ...</p>';

            fetch('/api/get_history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success' && data.history.length > 0) {
                    container.innerHTML = '';
                    data.history.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'history-item';
                        div.innerHTML = `
                            <span><b>${item.type}</b></span>
                            <span>${item.amount} ብር</span>
                            <span style="color: ${item.status.includes('አሸንፏል') || item.status === 'completed' ? '#63e2b7' : '#e94560'}">${item.status}</span>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p style="text-align: center; color: #8a8a8a;">ምንም ታሪክ አልተገኘም።</p>';
                }
            })
            .catch(err => {
                container.innerHTML = '<p style="text-align: center; color: #e94560;">ታሪኩን ማምጣት አልተቻለም።</p>';
            });
        }

        window.onload = loadBalance;
    </script>
</body>
</html>
