<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የሰፈር ጨዋታዎች - ዋና ማውጫ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --light-text: #ffffff;
            --success-color: #4e9f3d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--light-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Header Style */
        .header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background-color: var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .balance-box {
            background-color: rgba(78, 159, 61, 0.2);
            border: 1px solid var(--success-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #63e2b7;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 80px;
        }

        .welcome-msg {
            text-align: center;
            margin-top: 10px;
        }

        .welcome-msg h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 5px 0;
        }

        .welcome-msg p {
            color: #8a8a8a;
            margin: 0;
        }

        /* Game Cards List */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .game-card:active {
            transform: scale(0.98);
            border-color: var(--text-color);
        }

        .game-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-color), var(--text-color));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .game-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .game-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #aaaaaa;
        }

        .play-arrow {
            color: var(--text-color);
            font-size: 1.2rem;
        }

        /* Quick Action Buttons (Deposit/Withdraw) */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 12px;
            border-radius: 12px;
            color: var(--light-text);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        .action-btn:active {
            background-color: var(--accent-color);
        }

        /* Footer Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-top: 2px solid var(--accent-color);
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 10px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .nav-item.active {
            color: var(--text-color);
        }

        .nav-item i {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <!-- Upper Header -->
    <div class="header">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">U</div>
            <span id="user-name">የሰፈር ልጅ</span>
        </div>
        <div class="balance-box">
            <i class="fas fa-wallet"></i>
            <span id="user-balance">0.00</span> ብር
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        
        <div class="welcome-msg">
            <h1>ሰላም፣ <span id="welcome-name">ተጫዋች</span>!</h1>
            <p>የሚወዱትን ጨዋታ ይምረጡና ዕድልዎን ይሞክሩ።</p>
        </div>

        <!-- Quick Actions -->
        <div class="actions-grid">
            <button class="action-btn" onclick="tg.showAlert('የገቢ ማስገቢያ ሲስተም በቅርቡ ይዘመናል!')">
                <i class="fas fa-arrow-down" style="color: #4e9f3d;"></i> ብር አስገባ
            </button>
            <button class="action-btn" onclick="tg.showAlert('የወጪ መውጫ ሲስተም በቅርቡ ይዘመናል!')">
                <i class="fas fa-arrow-up" style="color: #e94560;"></i> ብር አውጣ
            </button>
        </div>

        <h2>🎮 ጨዋታዎች</h2>
        
        <!-- Game List Links -->
        <div class="games-list">
            
            <!-- Game 1: Horse Racing -->
            <a href="/horse_race" class="game-card">
                <div class="game-details">
                    <div class="game-icon">🐎</div>
                    <div class="game-info">
                        <h3>የፈረስ ውድድር (የበግ ሩጫ)</h3>
                        <p>ፈረስዎን ይምረጡና ቀድመው በመድረስ ያሸንፉ!</p>
                    </div>
                </div>
                <div class="play-arrow"><i class="fas fa-chevron-right"></i></div>
            </a>

            <!-- Game 2: Coin Flip -->
            <a href="/coin_flip_game" class="game-card">
                <div class="game-details">
                    <div class="game-icon">🪙</div>
                    <div class="game-info">
                        <h3>እጥፍ ወይስ ባዶ</h3>
                        <p>ዘውድ ወይስ ጎፈር? የመረጡት ከመጣ ባላንስዎን እጥፍ ያድርጉ!</p>
                    </div>
                </div>
                <div class="play-arrow"><i class="fas fa-chevron-right"></i></div>
            </a>

        </div>

    </div>

    <!-- Bottom Navigation Bar -->
    <div class="nav-bar">
        <div class="nav-item active">
            <i class="fas fa-gamepad"></i>
            <span>ጨዋታዎች</span>
        </div>
        <div class="nav-item" onclick="tg.showAlert('የታሪክ ማሳያ ገጽ በቅርቡ ይጨመራል!')">
            <i class="fas fa-history"></i>
            <span>ታሪክ</span>
        </div>
    </div>

    <script>
        // Telegram WebApp ማነሳሳት
        const tg = window.Telegram.WebApp;
        tg.expand();

        let userId = 123456789; // ለሙከራ እንዲሆን 
        let userName = "የሰፈር ልጅ";

        // እውነተኛ የ Telegram መረጃዎችን መውሰድ
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
            userName = tg.initDataUnsafe.user.first_name;
            
            document.getElementById('user-name').innerText = userName;
            document.getElementById('welcome-name').innerText = userName;
            document.getElementById('user-avatar').innerText = userName.charAt(0).toUpperCase();
        }

        // ባላንስ ከ API ላይ መጫን
        function loadBalance() {
            fetch('/api/get_balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('user-balance').innerText = parseFloat(data.balance).toFixed(2);
                }
            })
            .catch(err => console.error("Error loading balance:", err));
        }

        // ገጹ ሲጫን ባላንሱን አምጣ
        window.onload = loadBalance;
    </script>
</body>
</html>
