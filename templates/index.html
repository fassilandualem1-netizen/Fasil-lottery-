<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gashabet - Football Prediction</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- የራሳችንን CSS ለማገናኘት (በFlask መንገድ) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-24">

  <!-- 1. HEADER (የበላይ ራስጌ) -->
  <header class="bg-slate-950 text-white p-4 sticky top-0 z-50 flex justify-between items-center border-b border-gray-800">
    <div class="flex items-center space-x-2">
      <span class="text-xl font-black tracking-wider text-yellow-400">GASHA<span class="text-white">BET</span></span>
    </div>
    <div class="flex items-center space-x-3">
      <!-- Real Balance -->
      <div class="bg-gray-800 px-3 py-1.5 rounded-full text-xs font-bold flex items-center space-x-1">
        <span id="user-balance">100.00</span> <span class="text-yellow-400">ETB</span>
      </div>
      <!-- Deposit -->
      <button class="bg-yellow-500 hover:bg-yellow-600 text-slate-950 font-black px-3 py-1.5 rounded text-xs transition duration-200">
        DEPOSIT
      </button>
    </div>
  </header>

  <!-- 2. GAME NAVIGATION MENU (የጨዋታዎች መለዋወጫ ምናሌ - አሁን Chicken Road ተካቷል) -->
  <nav class="bg-slate-900 border-b border-gray-800 flex justify-around py-3 sticky top-[61px] z-40 text-center">
    <!-- Football (Active) -->
    <a href="/" class="flex flex-col items-center space-y-1 text-yellow-400 border-b-2 border-yellow-400 pb-1">
      <i class="fa-solid fa-soccer-ball text-lg"></i>
      <span class="text-[9px] sm:text-[11px] font-bold">Sports</span>
    </a>
    <!-- Zewd & Gofer -->
    <a href="/zewd" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-white transition">
      <i class="fa-solid fa-coins text-lg"></i>
      <span class="text-[9px] sm:text-[11px] font-bold">ዘውድ/ጎፈር</span>
    </a>
    <!-- Aviator -->
    <a href="/aviator" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-white transition">
      <i class="fa-solid fa-plane-departure text-lg"></i>
      <span class="text-[9px] sm:text-[11px] font-bold">Aviator</span>
    </a>
    <!-- 🐔 Chicken Road (አዲስ የተጨመረ) -->
    <a href="/chicken" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-white transition">
      <span class="text-lg leading-none">🐔</span>
      <span class="text-[9px] sm:text-[11px] font-bold">Chicken</span>
    </a>
    <!-- Fast Keno -->
    <a href="/keno" class="flex flex-col items-center space-y-1 text-gray-400 hover:text-white transition">
      <i class="fa-solid fa-table-cells text-lg"></i>
      <span class="text-[9px] sm:text-[11px] font-bold">Keno</span>
    </a>
  </nav>

  <!-- 3. MAIN PREDICTION SECTION -->
  <main class="max-w-md mx-auto p-3">
    
    <!-- Promotion Banner -->
    <div class="bg-gradient-to-r from-blue-900 to-slate-950 border border-blue-800 rounded-xl p-4 mb-4 relative overflow-hidden">
      <span class="bg-red-600 text-white text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">Hot Promo</span>
      <h3 class="text-base font-black mt-1">REAL MONEY PREDICTION</h3>
      <p class="text-[11px] text-gray-400">ግምቶቹን በትክክል ይመልሱ፣ በእውነተኛ ብር ያሸንፉ!</p>
    </div>

    <!-- 🎮 MINI GAMES SHORTCUTS (ፈጣን የጨዋታ አቋራጮች - አዲስ) -->
    <div class="grid grid-cols-4 gap-2 mb-4">
      <!-- Zewd -->
      <a href="/zewd" class="bg-slate-950 p-2 rounded-xl border border-gray-800 flex flex-col items-center hover:border-yellow-500 transition">
        <i class="fa-solid fa-coins text-yellow-500 text-base"></i>
        <span class="text-[9px] font-bold mt-1 text-gray-300">ዘውድና ጎፈር</span>
      </a>
      <!-- Aviator -->
      <a href="/aviator" class="bg-slate-950 p-2 rounded-xl border border-gray-800 flex flex-col items-center hover:border-yellow-500 transition">
        <i class="fa-solid fa-plane-departure text-red-500 text-base"></i>
        <span class="text-[9px] font-bold mt-1 text-gray-300">Aviator</span>
      </a>
      <!-- Chicken Road -->
      <a href="/chicken" class="bg-slate-950 p-2 rounded-xl border border-gray-800 flex flex-col items-center hover:border-yellow-500 transition">
        <span class="text-base">🐔</span>
        <span class="text-[9px] font-bold mt-1 text-gray-300">Chicken Road</span>
      </a>
      <!-- Keno -->
      <a href="/keno" class="bg-slate-950 p-2 rounded-xl border border-gray-800 flex flex-col items-center hover:border-yellow-500 transition">
        <i class="fa-solid fa-table-cells text-blue-500 text-base"></i>
        <span class="text-[9px] font-bold mt-1 text-gray-300">Fast Keno</span>
      </a>
    </div>

    <!-- Match category header -->
    <div class="flex justify-between items-center mb-3">
      <h2 class="text-sm font-black text-gray-300 tracking-wide uppercase"><i class="fa-solid fa-fire text-red-500 mr-1"></i> TOP MATCHES</h2>
      <span class="text-[11px] text-gray-400 bg-gray-800 px-2 py-0.5 rounded">1X2 Odds</span>
    </div>

    <!-- Football Matches List Container -->
    <div class="space-y-3" id="matches-list">
      
      <!-- Match 1 (Mock Data - ይህ በኋላ ላይ በ API ይቀየራል) -->
      <div class="bg-slate-950 p-4 rounded-xl border border-gray-800 shadow-lg">
        <div class="flex justify-between text-[10px] text-gray-500 mb-2">
          <span class="font-bold text-gray-400">⚽ ENG - Premier League</span>
          <span>ዛሬ 18:00</span>
        </div>
        <div class="text-xs font-black text-white mb-3 tracking-wide">ARSENAL V CHELSEA</div>
        
        <div class="grid grid-cols-3 gap-2 text-xs">
          <!-- Home Win (1) -->
          <button onclick="selectMatchBet('Arsenal V Chelsea', 'Arsenal', 1.85, '1')" id="btn-m1-1" class="bg-gray-900 hover:bg-yellow-500 hover:text-slate-950 py-2.5 rounded-lg flex flex-col items-center font-bold border border-gray-800 transition duration-150">
            <span class="text-gray-500 text-[10px]">Arsenal (1)</span>
            <span class="text-yellow-400 font-extrabold mt-0.5">1.85</span>
          </button>
          <!-- Draw (X) -->
          <button onclick="selectMatchBet('Arsenal V Chelsea', 'Draw', 3.40, 'X')" id="btn-m1-x" class="bg-gray-900 hover:bg-yellow-500 hover:text-slate-950 py-2.5 rounded-lg flex flex-col items-center font-bold border border-gray-800 transition duration-150">
            <span class="text-gray-500 text-[10px]">Draw (X)</span>
            <span class="text-yellow-400 font-extrabold mt-0.5">3.40</span>
          </button>
          <!-- Away Win (2) -->
          <button onclick="selectMatchBet('Arsenal V Chelsea', 'Chelsea', 4.10, '2')" id="btn-m1-2" class="bg-gray-900 hover:bg-yellow-500 hover:text-slate-950 py-2.5 rounded-lg flex flex-col items-center font-bold border border-gray-800 transition duration-150">
            <span class="text-gray-500 text-[10px]">Chelsea (2)</span>
            <span class="text-yellow-400 font-extrabold mt-0.5">4.10</span>
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- 4. BOTTOM FLOATING BETSLIP (የውርርድ ሰነድ) -->
  <div id="betslip-panel" class="fixed bottom-0 left-0 right-0 bg-slate-950 border-t border-gray-800 p-4 transform translate-y-full transition-transform duration-300 z-50">
    <div class="max-w-md mx-auto">
      <div class="flex justify-between items-center mb-3">
        <h3 class="font-black text-sm text-yellow-400"><i class="fa-solid fa-receipt mr-1"></i> BETSLIP (ግምትዎ)</h3>
        <button onclick="closeBetslip()" class="text-gray-500 hover:text-white text-xs">ይዝጉ <i class="fa-solid fa-chevron-down"></i></button>
      </div>

      <!-- Selected Match Details -->
      <div class="bg-gray-900 p-3 rounded-lg mb-3 text-xs">
        <div class="flex justify-between font-bold">
          <span id="slip-match-name">-</span>
          <span class="text-yellow-400" id="slip-choice">-</span>
        </div>
        <div class="text-[10px] text-gray-500 mt-1">ይህንን ቡድን መርጠዋል</div>
      </div>

      <!-- Input and calculations -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div>
          <label class="block text-[10px] text-gray-400 mb-1">የውርርድ መጠን (ETB)</label>
          <input type="number" id="bet-amount" oninput="calculateWin()" value="20" min="2" class="bg-gray-900 border border-gray-800 text-white rounded p-2 w-full text-center font-bold text-sm">
        </div>
        <div>
          <label class="block text-[10px] text-gray-400 mb-1">ኮፊሸንት (Odd) / ሊያሸንፉ የሚችሉት</label>
          <div class="bg-gray-900 p-2 rounded text-center font-bold text-sm border border-gray-800">
            <span class="text-blue-400" id="slip-odd">1.00</span> 🎯 <span class="text-green-400" id="potential-win">0.00 ETB</span>
          </div>
        </div>
      </div>

      <!-- Submit Bet Button -->
      <button onclick="submitBet()" class="w-full bg-green-500 hover:bg-green-600 text-slate-950 font-black py-3 rounded-xl transition duration-150">
        ውርርድ አስምር (Place Bet)
      </button>
    </div>
  </div>

  <!-- JavaScript for Frontend Actions -->
  <script>
    let selectedMatch = null;
    let selectedOdd = 1.00;
    let selectedChoice = "";

    function selectMatchBet(matchName, chosenTeam, odd, choice) {
      selectedMatch = matchName;
      selectedOdd = odd;
      selectedChoice = chosenTeam + " (" + choice + ")";
      
      // Update slip UI
      document.getElementById('slip-match-name').innerText = matchName;
      document.getElementById('slip-choice').innerText = selectedChoice;
      document.getElementById('slip-odd').innerText = odd;
      
      calculateWin();
      
      // Slide up the betslip panel
      document.getElementById('betslip-panel').classList.remove('translate-y-full');
    }

    function calculateWin() {
      let amount = parseFloat(document.getElementById('bet-amount').value) || 0;
      let potential = amount * selectedOdd;
      document.getElementById('potential-win').innerText = potential.toFixed(2) + " ETB";
    }

    function closeBetslip() {
      document.getElementById('betslip-panel').classList.add('translate-y-full');
    }

    function submitBet() {
      let amount = parseFloat(document.getElementById('bet-amount').value);
      if (amount < 2) {
        alert("⚠️ ዝቅተኛው የውርርድ መጠን 2 ETB ነው!");
        return;
      }
      
      // እዚህ ጋር ወደ ሰርቨር (Backend Python) የውርርድ ጥያቄ ይላካል
      alert("✅ ግምትዎ በተሳካ ሁኔታ ተመዝግቧል!\nየተመረጠ ጨዋታ: " + selectedMatch + "\nየተወራረደበት ብር: " + amount + " ETB");
      closeBetslip();
    }
  </script>
</body>
</html>
