<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ዘውድና ጎፈር</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --light-text: #ffffff;
            --success-color: #4e9f3d;
            --gold-color: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--light-text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        /* Confetti Canvas Container */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* Header Style */
        .header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background-color: var(--text-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .leaderboard-trigger {
            background-color: rgba(255, 215, 0, 0.15);
            border: 1px solid var(--gold-color);
            color: var(--gold-color);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .leaderboard-trigger:active {
            transform: scale(0.9);
        }

        .balance-box {
            background-color: rgba(78, 159, 61, 0.2);
            border: 1px solid var(--success-color);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #63e2b7;
        }

        /* New Locked Balance Box Style */
        .locked-box {
            background-color: rgba(243, 156, 18, 0.15);
            border: 1px solid #f39c12;
            padding: 8px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
            color: #f1c40f;
            font-size: 0.9rem;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 80px;
        }

        /* Welcome layout */
        .welcome-msg {
            text-align: center;
            margin-top: 10px;
        }

        .welcome-msg h1 {
            font-size: 1.8rem;
            color: var(--text-color);
            margin: 0 0 5px 0;
        }

        .welcome-msg p {
            color: #8a8a8a;
            margin: 0;
        }

        /* Stat Panel */
        .stat-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-box h4 { margin: 0; font-size: 0.9rem; color: #8a8a8a; }
        .stat-box p { margin: 5px 0 0 0; font-weight: bold; font-size: 1.1rem; color: var(--gold-color); }

        /* Game Cards List */
        .games-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .game-card:active {
            transform: scale(0.98);
            border-color: var(--text-color);
        }

        .game-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-color), var(--text-color));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .game-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }

        .game-info p {
            margin: 0;
            font-size: 0.85rem;
            color: #aaaaaa;
        }

        .play-arrow {
            color: var(--text-color);
            font-size: 1.2rem;
        }

        /* Quick Action Buttons */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--accent-color);
            padding: 12px;
            border-radius: 12px;
            color: var(--light-text);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .action-btn:active {
            background-color: var(--accent-color);
        }

        /* Coin Toss View Styles */
        .coin-wrapper {
            perspective: 1500px;
            margin: 25px auto;
            width: 190px;
            height: 190px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .coin {
            width: 180px;
            height: 180px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg);
            transition: transform 0.1s linear;
        }

        .coin-side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.7rem;
            box-sizing: border-box;
            border: 9px solid #cc9900;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0,0,0,0.4);
        }

        .coin-front {
            background: radial-gradient(circle, #ffe57f 0%, #ffb300 70%, #ff8f00 100%);
            color: #4e342e;
            z-index: 2;
        }

        .coin-back {
            background: radial-gradient(circle, #ffffff 0%, #b0bec5 70%, #78909c 100%);
            color: #263238;
            transform: rotateY(180deg);
            border-color: #90a4ae;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0,0,0,0.3);
        }

        /* New Neutral State Coin Styles (Dark-Blue/Violet) */
        .coin-side.neutral-front {
            background: radial-gradient(circle, #2d114d 0%, #17092c 70%, #0d041c 100%) !important;
            color: #dfa6ff !important;
            border-color: #5c2c90 !important;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(110,30,180,0.3) !important;
        }

        .coin-side.neutral-back {
            background: radial-gradient(circle, #2d114d 0%, #17092c 70%, #0d041c 100%) !important;
            color: #dfa6ff !important;
            border-color: #5c2c90 !important;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(110,30,180,0.3) !important;
            transform: rotateY(180deg) !important;
        }

        .coin-emoji {
            font-size: 3.5rem;
            margin-bottom: 4px;
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.4));
        }

        @keyframes coin-toss-bounce {
            0% { transform: translateY(0) scale(1); }
            20% { transform: translateY(-130px) scale(1.2); }
            70% { transform: translateY(0) scale(0.95); }
            80% { transform: translateY(-18px) scale(1.05); }
            90% { transform: translateY(0) scale(0.98); }
            100% { transform: translateY(0) scale(1); }
        }

        .coin-wrapper.animate-toss {
            animation: coin-toss-bounce 3.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        /* Controls Card */
        .controls-card {
            background-color: var(--card-bg);
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Circular Choice Buttons styling */
        .choice-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 5px;
        }

        .choice-btn {
            background-color: var(--accent-color);
            border: 2px solid transparent;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            color: var(--light-text);
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
            padding: 0;
        }

        .choice-btn.selected {
            border-color: var(--gold-color);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            background-color: rgba(255, 215, 0, 0.15);
        }

        /* Compact Stepper UI Control */
        .stepper-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
            gap: 10px;
            max-width: 220px;
            margin-left: auto;
            margin-right: auto;
        }

        .stepper-btn {
            background-color: var(--accent-color);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--light-text);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .stepper-btn:active {
            background-color: rgba(255,215,0,0.2);
        }

        .bet-input {
            background-color: var(--accent-color);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--gold-color);
            width: 100px;
            height: 45px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .play-btn {
            background: linear-gradient(135deg, var(--gold-color), #ffb300);
            border: none;
            color: #1a1a2e;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .play-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Daily Bonus Wheel Styles */
        .wheel-container {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,215,0,0.2);
            text-align: center;
        }

        .wheel-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--gold-color);
            margin-bottom: 10px;
        }

        .wheel-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 15px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                #4e9f3d 0deg 60deg,
                #0f3460 60deg 120deg,
                #e94560 120deg 180deg,
                #f39c12 180deg 240deg,
                #3498db 240deg 300deg,
                #9b59b6 300deg 360deg
            );
            transition: transform 4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 8px solid #ffd700;
            box-shadow: 0 0 30px rgba(255,215,0,0.4);
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: #ffd700;
            z-index: 10;
        }

        .spin-btn {
            background: linear-gradient(135deg, var(--success-color), #2e7d32);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .spin-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="user-info">
            <div class="user-avatar" id="user-avatar">👤</div>
            <span id="user-name">የሰፈር ልጅ</span>
        </div>
        <div class="header-actions">
            <button onclick="handleLogout()" class="leaderboard-trigger">
                <i class="fas fa-sign-out-alt"></i>
            </button>
            <div class="balance-box">
                <i class="fas fa-wallet"></i>
                <span id="user-balance">0.00</span> ETB
            </div>
        </div>
    </header>

    <div class="container">
        <div class="welcome-msg">
            <h1>👋 እንኳን ደህና መጡ!</h1>
            <p>የዘውድና ጎፈር ጨዋታዎችን ይጫወቱ!</p>
        </div>

        <!-- Daily Bonus Wheel -->
        <div class="wheel-container">
            <h3 class="wheel-title">🎡 የዕለቱ ነጻ ዕድል</h3>
            <div class="wheel-wrapper">
                <div class="wheel-pointer">▼</div>
                <div id="bonus-wheel" class="wheel"></div>
            </div>
            <p id="wheel-status"></p>
            <button id="spin-wheel-btn" onclick="spinDailyWheel()" class="spin-btn">ሩሌቱን አሽከርክር</button>
        </div>

        <!-- Coin Flip Game -->
        <div class="controls-card">
            <h3 class="text-center text-lg font-bold text-yellow-400 mb-2">🪙 ዘውድና ጎፈር</h3>
            
            <div class="coin-wrapper">
                <div class="coin" id="coin">
                    <div class="coin-side coin-front neutral-front">
                        <div class="coin-emoji">🪙</div>
                        <div>ዘውድ</div>
                    </div>
                    <div class="coin-side coin-back neutral-back">
                        <div class="coin-emoji">🪙</div>
                        <div>ጎፈር</div>
                    </div>
                </div>
            </div>

            <div class="choice-grid">
                <button class="choice-btn" id="choice-head" onclick="selectChoice('ዘውድ')">
                    <span>🪙</span>
                    <span>ዘውድ</span>
                </button>
                <button class="choice-btn" id="choice-tail" onclick="selectChoice('ጎፈር')">
                    <span>🪙</span>
                    <span>ጎፈር</span>
                </button>
            </div>

            <div class="stepper-container">
                <button class="stepper-btn" onclick="changeBet(-10)">-</button>
                <input type="number" id="bet-amount" class="bet-input" value="10" min="1">
                <button class="stepper-btn" onclick="changeBet(10)">+</button>
            </div>

            <button id="play-btn" onclick="startCoinFlip()" class="play-btn" disabled>🎮 ጨዋታውን ጀምር</button>
        </div>
    </div>

    <script>
        // --- AUTH INTEGRATION ---
        let currentUser = null;
        let userId = null;
        let userName = null;
        const storedUser = localStorage.getItem('currentUser');
        
        if (storedUser) {
            currentUser = JSON.parse(storedUser);
            userId = currentUser.id;
            userName = currentUser.username;
        } else {
            window.location.href = '/login';
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                window.location.href = '/login';
            }
        }

        // --- TELEGRAM INTEGRATION (OPTIONAL) ---
        const tg = window.Telegram?.WebApp || null;
        if (tg) {
            tg.expand();
        }

        // --- UI INITIALIZATION ---
        let currentBalance = 0;
        let selectedChoice = null;

        document.addEventListener("DOMContentLoaded", function() {
            if (document.getElementById("user-name")) {
                document.getElementById("user-name").innerText = userName || "የሰፈር ልጅ";
                if (userName && userName.length > 0) {
                    document.getElementById("user-avatar").innerText = userName.charAt(0).toUpperCase();
                }
            }
            fetchBalance();
            updateWheelCooldown();
        });

        // --- BALANCE FETCH ---
        async function fetchBalance() {
            try {
                const res = await fetch('/api/get_balance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await res.json();
                if (data.status === "success") {
                    const newBalance = data.balance;
                    const balEl = document.getElementById("user-balance");
                    
                    if (balEl && newBalance !== currentBalance) {
                        balEl.innerText = newBalance.toFixed(2);
                        
                        balEl.style.transition = "color 0.5s";
                        balEl.style.color = "#2ed573";
                        setTimeout(() => { balEl.style.color = "inherit"; }, 1500);
                    }
                    currentBalance = newBalance;
                }
            } catch (e) { 
                console.error("ባላንስ ማግኘት አልተቻለም", e); 
            }
        }

        // --- COIN FLIP GAME ---
        function selectChoice(choice) {
            selectedChoice = choice;
            document.querySelectorAll('.choice-btn').forEach(btn => btn.classList.remove('selected'));
            const btnId = choice === 'ዘውድ' ? 'choice-head' : 'choice-tail';
            document.getElementById(btnId).classList.add('selected');
            document.getElementById('play-btn').disabled = false;

            const coin = document.getElementById('coin');
            if (choice === 'ዘውድ') {
                coin.querySelector('.coin-front').classList.remove('neutral-front');
                coin.querySelector('.coin-back').classList.add('neutral-back');
            } else {
                coin.querySelector('.coin-back').classList.remove('neutral-back');
                coin.querySelector('.coin-front').classList.add('neutral-front');
            }
        }

        function changeBet(amount) {
            const betInput = document.getElementById('bet-amount');
            let current = parseInt(betInput.value) || 10;
            let newValue = current + amount;
            if (newValue < 1) newValue = 1;
            betInput.value = newValue;
        }

        async function startCoinFlip() {
            if (!selectedChoice) {
                alert('እባክዎ ግምትዎን ይምረጡ!');
                return;
            }
            const betAmount = parseFloat(document.getElementById('bet-amount').value);
            if (betAmount <= 0) {
                alert('እባክዎ ትክክለኛ የብር መጠን ያስገቡ!');
                return;
            }
            if (betAmount > currentBalance) {
                alert('ይቅርታ፣ ውርርድ ለማስያዝ በቂ ባላንስ የለዎትም!');
                return;
            }

            document.getElementById('play-btn').disabled = true;
            const coinWrapper = document.querySelector('.coin-wrapper');
            const coin = document.getElementById('coin');
            
            coinWrapper.classList.add('animate-toss');
            
            let rotation = 0;
            const spinInterval = setInterval(() => {
                rotation += 30;
                coin.style.transform = `rotateY(${rotation}deg)`;
            }, 50);

            try {
                const res = await fetch('/api/coin_flip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: userId, 
                        choice: selectedChoice, 
                        bet_amount: betAmount 
                    })
                });
                const data = await res.json();
                
                setTimeout(() => {
                    clearInterval(spinInterval);
                    coinWrapper.classList.remove('animate-toss');
                    
                    let finalRotation = 0;
                    if (data.result === 'ዘውድ') {
                        finalRotation = 0;
                    } else {
                        finalRotation = 180;
                    }
                    coin.style.transform = `rotateY(${finalRotation}deg)`;
                    coin.querySelector('.coin-front').classList.remove('neutral-front');
                    coin.querySelector('.coin-back').classList.remove('neutral-back');
                    
                    alert(data.message);
                    fetchBalance();
                    
                    document.getElementById('play-btn').disabled = false;
                }, 3200);
            } catch (e) { 
                clearInterval(spinInterval);
                coinWrapper.classList.remove('animate-toss');
                alert("የሳንቲም ጨዋታው ሰርቨር ላይ አልተገኘም!"); 
                document.getElementById('play-btn').disabled = false;
            }
        }

        // --- DAILY BONUS WHEEL ---
        const wheelSegments = [
            { angle: 30, text: "1 ብር", value: 1 },
            { angle: 90, text: "2 ብር", value: 2 },
            { angle: 150, text: "5 ብር", value: 5 },
            { angle: 210, text: "ባዶ", value: 0 },
            { angle: 270, text: "3 ብር", value: 3 },
            { angle: 330, text: "4 ብር", value: 4 }
        ];

        let isWheelSpinning = false;
        let wheelCooldownInterval;

        function updateWheelCooldown() {
            const spinBtn = document.getElementById("spin-wheel-btn");
            const statusEl = document.getElementById("wheel-status");
            
            if (!spinBtn) return;
            if (wheelCooldownInterval) clearInterval(wheelCooldownInterval);

            wheelCooldownInterval = setInterval(() => {
                const lastSpin = localStorage.getItem("last_spin_" + userId);
                
                if (!lastSpin) {
                    clearInterval(wheelCooldownInterval);
                    spinBtn.disabled = false;
                    spinBtn.innerText = "ሩሌቱን አሽከርክር";
                    spinBtn.style.backgroundColor = "";
                    spinBtn.style.cursor = "pointer";
                    if (statusEl) statusEl.innerText = "";
                    return;
                }

                const now = Date.now();
                const nextSpinTime = parseInt(lastSpin) + (24 * 60 * 60 * 1000);
                const timeLeft = nextSpinTime - now;

                if (timeLeft <= 0) {
                    clearInterval(wheelCooldownInterval);
                    localStorage.removeItem("last_spin_" + userId);
                    spinBtn.disabled = false;
                    spinBtn.innerText = "ሩሌቱን አሽከርክር";
                    spinBtn.style.backgroundColor = "";
                    spinBtn.style.cursor = "pointer";
                    if (statusEl) statusEl.innerText = "";
                } else {
                    spinBtn.disabled = true;
                    spinBtn.style.backgroundColor = "#555";
                    spinBtn.style.cursor = "not-allowed";

                    const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                    const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    spinBtn.innerText = `🔒 ተቆልፏል (${timeString})`;
                    if (statusEl) {
                        statusEl.innerHTML = `<span style="color: #e74c3c; font-size: 0.85rem;">⚠️ ይህንን ዕድል በቀን አንድ ጊዜ ብቻ መጠቀም ይችላሉ!</span>`;
                    }
                }
            }, 1000);
        }

        async function spinDailyWheel() {
            if (isWheelSpinning) return;
            const lastSpin = localStorage.getItem("last_spin_" + userId);
            if (lastSpin) {
                const timeLeft = parseInt(lastSpin) + (24 * 60 * 60 * 1000) - Date.now();
                if (timeLeft > 0) return alert("እባክዎ የሰዓት ገደቡ እስኪያልቅ ይጠብቁ!");
            }

            isWheelSpinning = true;
            const spinBtn = document.getElementById("spin-wheel-btn");
            const wheel = document.getElementById("bonus-wheel");
            const statusEl = document.getElementById("wheel-status");

            if (spinBtn) spinBtn.disabled = true;
            if (statusEl) statusEl.innerText = "ዕድልዎን በመፈለግ ላይ...";

            const prizeIndex = Math.floor(Math.random() * wheelSegments.length);
            const selectedPrize = wheelSegments[prizeIndex];
            const extraSpins = 5;
            const targetAngle = selectedPrize.angle;
            const finalRotation = (extraSpins * 360) - targetAngle;

            if (wheel) {
                wheel.style.transform = `rotate(${finalRotation}deg)`;
            }

            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            setTimeout(async () => {
                isWheelSpinning = false;
                if (selectedPrize.value > 0) {
                    if (statusEl) {
                        statusEl.innerHTML = `<span style="color: #2ed573; font-size: 1.1rem;">🎉 እንኳን ደስ አለዎት! +${selectedPrize.text} አሸንፈዋል!</span>`;
                    }
                    currentBalance += selectedPrize.value;
                    const balEl = document.getElementById("user-balance");
                    if (balEl) {
                        balEl.innerText = currentBalance.toFixed(2);
                        balEl.style.transition = "color 0.5s";
                        balEl.style.color = "#2ed573";
                        setTimeout(() => { balEl.style.color = "inherit"; }, 1500);
                    }
                    try {
                        await fetch('/api/claim_daily_bonus', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: userId, amount: selectedPrize.value })
                        });
                    } catch (e) {
                        console.error("ቦነሱን ሰርቨር ላይ ማስቀመጥ አልተቻለም", e);
                    }
                } else {
                    if (statusEl) {
                        statusEl.innerHTML = `<span style="color: #ff4757; font-size: 1rem;">😢 ባዶ ወጥቷል! ነገ በድጋሚ ይሞክሩ።</span>`;
                    }
                }
                localStorage.setItem("last_spin_" + userId, Date.now().toString());
                updateWheelCooldown();
            }, 4000);
        }
    </script>
</body>
</html>
